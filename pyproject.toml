[project]
name = "riso"
version = "0.1.0"
description = "Modular Copier-based project template for Python and Node.js applications"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Riso Template Working Group"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Code Generators",
]
dependencies = []

[project.scripts]
riso-mcp = "riso.mcp.server:main"

[project.entry-points."fastmcp.servers"]
riso = "riso.mcp.server:mcp"

[project.urls]
Homepage = "https://github.com/wyattowalsh/riso"
Documentation = "https://github.com/wyattowalsh/riso/tree/main/docs"
Repository = "https://github.com/wyattowalsh/riso"
Issues = "https://github.com/wyattowalsh/riso/issues"

[dependency-groups]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-mock>=3.0",
    "ruff>=0.8.0",
    "ty>=0.0.6",
    "pylint>=3.0",
    "pip-audit>=2.0",
    "pyyaml>=6.0",
    "copier>=9.1.0",
    "pre-commit>=3.0",
]
test = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-mock>=3.0",
    "pyyaml>=6.0",
]
docs = [
    "sphinx>=8.0",
    "shibuya>=2024.12",
    "myst-parser>=4.0",
    "sphinx-autobuild>=2024.10",
    "sphinx-copybutton>=0.5",
    "sphinx-design>=0.6",
    "sphinx-tabs>=3.4",
    "sphinx-togglebutton>=0.3",
    "sphinxemoji>=0.3",
    "sphinxcontrib-mermaid>=0.9",
    "sphinx-autodoc2>=0.5",
    "sphinx-autodoc-typehints>=2.0",
    "autoclasstoc>=1.7",
    "sphinx-click>=5.0",
    "sphinx-jsonschema>=1.19",
    "sphinxcontrib-httpdomain>=1.8",
    "sphinx-git>=11.0",
    "sphinx-hoverxref>=1.4",
    "sphinx-sitemap>=2.6",
    "sphinx-notfound-page>=1.0",
    "pyyaml>=6.0",
    "linkify-it-py>=2.0",
]
mcp = [
    "fastmcp>=2.13.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "loguru>=0.7.0",
    "tomli>=2.0.0",
    "pyyaml>=6.0",
    "rich>=13.0",
]
tui = [
    "textual>=0.85.0",
    "rich>=13.0",
    "pyyaml>=6.0",
    "jinja2>=3.0",
    "copier>=9.1.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "docker: marks tests that require Docker",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
branch = true
source = ["src/riso", "scripts", "template/hooks"]
omit = ["*/__pycache__/*", "*/tests/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/riso"]
