# Riso Template Development Pre-commit Configuration
# See https://pre-commit.com for more information
# Install hooks: make setup (or: uv run pre-commit install --install-hooks)

default_stages: [pre-commit]
default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  # ============================================
  # Python Code Quality
  # ============================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(scripts|template/hooks|tests|src)/.*\.py$
      - id: ruff-format
        name: ruff format
        files: ^(scripts|template/hooks|tests|src)/.*\.py$

  - repo: local
    hooks:
      - id: ty-check
        name: ty type check
        entry: uv run ty check src/riso scripts template/hooks
        language: system
        types: [python]
        files: ^(scripts|template/hooks)/.*\.py$
        pass_filenames: false

      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        files: ^(scripts|template/hooks|tests|src)/.*\.py$
        args: [--rcfile=pyproject.toml]

  # ============================================
  # Dead Code Detection
  # ============================================
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        name: vulture dead code
        args: [src/riso, scripts, template/hooks, vulture_whitelist.py, --min-confidence, "80"]

  # ============================================
  # Secrets Detection
  # ============================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: gitleaks secrets scan

  # ============================================
  # Security Scanning (pre-push only)
  # ============================================
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit vulnerability scan
        entry: uv run pip-audit
        language: system
        pass_filenames: false
        stages: [pre-push]

  # ============================================
  # Shell Script Linting
  # ============================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: shellcheck
        args: [--severity=warning]
        exclude: ^\.specify/  # External tooling scripts

  # ============================================
  # Spell Checking
  # ============================================
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: codespell
        args:
          - --skip=*.lock,pnpm-lock.yaml,*.json,*.min.js,*.min.css,.git,node_modules,__pycache__
          # crate,ot,te,nd: existing ignores
          # MoR: Merchant of Record (billing term)
          # NotIn: Python AST node type (ast.NotIn)
          # ure: part of "feature" regex pattern
          # astroid: Python static analysis library name
          # Retrive,instantating,environemnt: typos in external context files (excluded anyway)
          - --ignore-words-list=crate,ot,te,nd,MoR,NotIn,ure,astroid
        exclude: ^(samples/|template/files/|web/public/docs/|\.github/context/|\.codex/|specs/|.*pnpm-lock\.yaml)

  # ============================================
  # GitHub Actions Workflow Validation
  # ============================================
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint
        name: actionlint
        files: ^\.github/workflows/.*\.ya?ml$

  # JSON Schema validation for common config files
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.36.0
    hooks:
      - id: check-github-workflows
        name: validate github workflows
      - id: check-github-actions
        name: validate github actions
        files: ^\.github/actions/.*\.ya?ml$

  # ============================================
  # Markdown Formatting
  # ============================================
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.21
    hooks:
      - id: mdformat
        name: mdformat
        additional_dependencies:
          - mdformat-gfm          # GitHub-flavored markdown
          - mdformat-frontmatter  # YAML frontmatter support
          - mdformat-toc          # Table of contents
        exclude: ^(template/files/|samples/|web/public/docs/|CHANGELOG\.md)

  # ============================================
  # YAML/TOML/General Validation
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: check yaml
        args: [--unsafe]  # Allow custom tags for GitHub Actions
        exclude: ^(template/|tests/fixtures/yaml_samples/|specs/012-saas-starter/contracts/copier-prompts\.yml)
      - id: check-toml
        name: check toml
      - id: check-json
        name: check json
      - id: end-of-file-fixer
        name: fix end of files
        exclude: ^(template/files/|web/public/docs/)
      - id: trailing-whitespace
        name: trim trailing whitespace
        exclude: ^(template/files/|web/public/docs/)
      - id: check-added-large-files
        name: check for large files
        args: [--maxkb=1000]
      - id: check-merge-conflict
        name: check for merge conflicts
      - id: detect-private-key
        name: detect private keys
      - id: check-case-conflict
        name: check case conflicts
      - id: check-symlinks
        name: check symlinks
      - id: check-executables-have-shebangs
        name: check executables have shebangs
      - id: check-shebang-scripts-are-executable
        name: check shebang scripts executable

  # ============================================
  # Jinja Template Validation
  # ============================================
  - repo: local
    hooks:
      - id: jinja-syntax
        name: jinja template syntax
        entry: uv run python scripts/ci/validate_jinja_templates.py
        language: system
        files: \.jinja$
        # Exclude files with syntax conflicts:
        # - TypeScript: type annotations (: Type) conflict with Jinja
        # - Markdown: may contain code blocks with conflicting syntax
        # - Shell scripts: ${#array[@]} bash syntax conflicts with Jinja comments
        exclude: \.(tsx?|md|sh)\.jinja$
        pass_filenames: true

  # ============================================
  # Commit Message Validation (commit-msg stage)
  # ============================================
  # Primary: commitlint with full .commitlintrc.yml config
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        entry: scripts/hooks/commit-msg.sh
        language: system
        stages: [commit-msg]
        always_run: true

  # Fallback: conventional-pre-commit (Python-based, no Node required)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        name: conventional commits (fallback)
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - chore
          - refactor
          - test
          - perf
          - ci
          - build
          - revert
          - style

  # ============================================
  # Pre-push: Full Test Suite
  # ============================================
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests -x -q --tb=short
        language: system
        pass_filenames: false
        stages: [pre-push]

# CI configuration
ci:
  autofix_prs: true
  autoupdate_schedule: weekly
  # Skip slow/local hooks in CI (run separately in dedicated jobs)
  skip: [ty-check, pylint, pip-audit, pytest, vulture, gitleaks, commitlint]
