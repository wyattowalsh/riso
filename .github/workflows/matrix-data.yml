name: Matrix Data

on:
  workflow_dispatch:
    inputs:
      skip_render:
        description: "Skip rendering samples and reuse existing metadata"
        type: boolean
        default: false
      open_pr:
        description: "Open a PR with updated matrix metadata"
        type: boolean
        default: true
  schedule:
    - cron: "0 7 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-matrix-data:
    runs-on: ubuntu-latest
    env:
      COPIER_CMD: ${{ github.workspace }}/.venv/bin/copier
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Install Python dependencies
        run: uv sync --group dev --group cli

      - name: Render sample matrix
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_render != 'true' }}
        run: uv run python scripts/ci/render_matrix.py

      - name: Generate matrix data snapshot
        run: uv run python scripts/ci/generate_matrix_data.py

      - name: Upload matrix data artifact
        uses: actions/upload-artifact@v6
        with:
          name: matrix-data-${{ github.run_id }}
          path: |
            samples/metadata/matrix-data.json
            samples/metadata/render_matrix.json
            samples/metadata/module_success.json
          retention-days: 90

      - name: Create pull request
        if: >-
          ${{ github.event_name == 'schedule' ||
              (github.event_name == 'workflow_dispatch' && github.event.inputs.open_pr == 'true') }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(matrix): refresh matrix data"
          title: "chore(matrix): refresh matrix data"
          body: "Updates aggregated matrix metadata and SSOT snapshot."
          branch: "automation/matrix-data"
          delete-branch: true
          add-paths: |
            samples/metadata/matrix-data.json
            samples/metadata/render_matrix.json
            samples/metadata/module_success.json
          labels: "automation,metadata"
