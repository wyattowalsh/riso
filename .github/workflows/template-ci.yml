name: Template CI

on:
  push:
    branches:
      - main
      - trunk
  pull_request:
    paths:
      - "template/**"
      - "scripts/**"
      - "samples/**"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Baseline Quickstart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Bootstrap Baseline
        run: |
          uv sync
          uv run python scripts/ci/run_baseline_quickstart.py
      - name: Upload Baseline Evidence
        uses: actions/upload-artifact@v6
        with:
          name: baseline-quickstart
          path: samples/default

  render-matrix:
    name: Render Matrix
    runs-on: ubuntu-latest
    needs: baseline
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Enable pnpm
        run: corepack enable
      - name: Install uv
        run: pip install uv
      - name: Install render dependencies
        run: uv sync --group dev --group cli
      - name: Render Samples
        run: ./scripts/render-samples.sh
      - name: Aggregate Module Success
        run: uv run python scripts/ci/record_module_success.py
      - name: Enforce Module Success Threshold
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          metrics = json.loads(Path("samples/metadata/module_success.json").read_text())
          failing = {}
          for name, stats in metrics.get("modules", {}).items():
              total = stats.get("total_recorded", 0)
              success = stats.get("success_rate", 0.0)
              if total and success < 0.98:
                  failing[name] = success
          if failing:
              raise SystemExit(f"Module success rate below threshold: {failing}")
          PY
      - name: Upload Render Metadata
        uses: actions/upload-artifact@v6
        with:
          name: render-matrix
          path: |
            samples/*/metadata.json
            samples/*/smoke-results.json
            samples/metadata/module_success.json

  python-quality:
    name: Python Quality (${{ matrix.profile }})
    needs: render-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: ["standard", "strict"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Enable pnpm
        run: corepack enable
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run quality suite
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
        run: |
          uv run python scripts/ci/run_quality_suite.py \
            --profile "${{ matrix.profile }}" \
            --log-dir "quality-${{ matrix.profile }}"
      - name: Upload quality artifacts
        uses: actions/upload-artifact@v6
        with:
          name: quality-${{ matrix.profile }}
          path: quality-${{ matrix.profile }}
          retention-days: 90

  aggregate-quality-status:
    name: Aggregate Quality Status
    needs: python-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --group dev
      - uses: actions/download-artifact@v4
        with:
          name: quality-standard
          path: artifacts/quality-standard
      - uses: actions/download-artifact@v4
        with:
          name: quality-strict
          path: artifacts/quality-strict
      - name: Consolidate render matrix
        run: |
          uv run python scripts/ci/render_matrix.py \
            --skip-render \
            --quality-artifacts \
              artifacts/quality-standard/quality-results.json \
              artifacts/quality-strict/quality-results.json \
            --retention-days 90
      - name: Upload consolidated summary
        uses: actions/upload-artifact@v6
        with:
          name: quality-summary
          path: samples/metadata/render_matrix.json
          retention-days: 90

  docs:
    name: Documentation Builds
    runs-on: ubuntu-latest
    needs: aggregate-quality-status
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Enable pnpm
        run: corepack enable
      - name: Install Documentation Tooling
        run: |
          pip install uv
          uv sync --group dev --group docs
          if [ -f package.json ]; then pnpm install; fi
      - name: Build Sphinx Docs
        run: uv run sphinx-build -W -b html docs dist/docs-shibuya
      - name: Build Fumadocs Site
        run: |
          if [ -f package.json ]; then pnpm --filter docs-fumadocs build; else echo "Skipping Fumadocs build"; fi
      - name: Track Publish SLA
        run: |
          uv run python scripts/ci/track_doc_publish.py --site shibuya --status pass --duration 0
          uv run python scripts/ci/track_doc_publish.py --site fumadocs --status pass --duration 0
      - name: Upload Documentation Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: documentation-sites
          path: |
            dist/docs-shibuya
            samples/metadata/doc_publish.json

  governance:
    name: Governance Checkpoints
    runs-on: ubuntu-latest
    needs: [aggregate-quality-status, docs]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --group dev
      - name: Dry Run Compliance Checkpoints
        run: |
          uv run python scripts/compliance/checkpoints.py \
            --principle automation_governed \
            --status pass \
            --evidence "CI passed" \
            --dry-run
      - name: Upload Governance Evidence
        uses: actions/upload-artifact@v6
        with:
          name: governance-evidence
          path: |
            samples/metadata/module_success.json
            samples/metadata/doc_publish.json
