name: Code Quality

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        quality-profile: ["standard", "strict"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run quality suite
        run: uv run python scripts/ci/run_quality_suite.py

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=scripts \
            --cov=template/hooks \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70 \
            --junitxml=test-results.xml \
            -v

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
            test-results.xml
          retention-days: 30

  sync-test:
    name: Quality Interface Sync Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | sudo bash -s -- --to /usr/local/bin

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Render default sample for testing
        run: |
          ./scripts/render-samples.sh \
            --variant default \
            --answers samples/default/copier-answers.yml

      - name: Run sync test
        run: |
          uv run python tests/automation/sync_test.py \
            --threshold 15 \
            --output sync_test_results.json \
            --cwd samples/default/render
        continue-on-error: true

      - name: Upload sync test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: sync-test-results
          path: sync_test_results.json
          if-no-files-found: warn
          retention-days: 90

      - name: Check sync test status
        run: |
          if [ -f sync_test_results.json ]; then
            STATUS=$(jq -r '.overall_status' sync_test_results.json)
            echo "Sync test status: $STATUS"
            if [ "$STATUS" = "FAIL" ]; then
              echo "❌ Sync test failed - make and uv task quality are out of sync"
              exit 1
            elif [ "$STATUS" = "WARN" ]; then
              echo "⚠️ Sync test warning - performance variance detected"
              exit 0
            else
              echo "✅ Sync test passed"
              exit 0
            fi
          else
            echo "❌ Sync test results file not found"
            exit 1
          fi

  lint-workflows:
    name: Lint GitHub Actions Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Validate maintainer workflows
        run: uv run python scripts/ci/validate_workflows.py

  verify-context-sync:
    name: Verify Context Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Verify template context parity
        run: uv run python scripts/ci/verify_context_sync.py

  validate-agents-ecosystem:
    name: Validate AGENTS Ecosystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Validate template artifacts
        run: |
          uv run python scripts/ci/validate_agents_ecosystem.py
          uv run python scripts/ci/check_quality_parity.py
          uv run pre-commit validate-config

      - name: Render AGENTS validation samples
        run: |
          ./scripts/render-samples.sh \
            --variant default \
            --answers samples/default/copier-answers.yml
          ./scripts/render-samples.sh \
            --variant ai-tools-off \
            --answers samples/ai-tools-off/copier-answers.yml

      - name: Validate rendered AGENTS trees
        run: |
          uv run python scripts/ci/validate_agents_ecosystem.py \
            --render-enabled samples/default/render \
            --render-disabled samples/ai-tools-off/render
          uv run python scripts/ci/agent_smoke_agents_md.py samples/default/render --json
          uv run python scripts/ci/agent_smoke_agents_md.py samples/ai-tools-off/render --json

  cli-tests:
    name: Riso CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run CLI unit tests
        run: |
          uv run pytest tests/unit/test_cli/ -v --tb=short

      - name: Verify CLI entry point
        run: |
          uv run riso --help
          uv run riso doctor --json

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pip-audit
        run: uv run pip-audit --strict --vulnerability-service osv

  docs-build:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build documentation
        run: |
          uv run sphinx-build -W -b html docs docs/_build

      - name: Check documentation links (advisory)
        run: |
          uv run sphinx-build -W -b linkcheck docs docs/_build/linkcheck
        continue-on-error: true

      - name: Upload documentation
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: documentation
          path: docs/_build/html
          retention-days: 30

  validate-samples:
    name: Validate Sample Renders
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Comprehensive sample coverage including base templates and SaaS variants
        # - 3 base templates: default, api-python, full-stack
        # - 4 SaaS starters: vercel-starter, enterprise-ready, b2c-consumer-app, prelaunch-waitlist
        # - 1 docs template: cli-docs
        variant:
          - default
          - api-python
          - full-stack
          - saas-starter/vercel-starter
          - saas-starter/enterprise-ready
          - cli-docs
          - saas-starter/b2c-consumer-app
          - saas-starter/prelaunch-waitlist
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Install dependencies
        run: uv sync --group dev

      - name: Render sample - ${{ matrix.variant }}
        run: |
          ./scripts/render-samples.sh \
            --variant ${{ matrix.variant }} \
            --answers samples/${{ matrix.variant }}/copier-answers.yml

      - name: Validate pre-commit render layout
        run: uv run python scripts/ci/render_precommit_configs.py --variants ${{ matrix.variant }}

      - name: Verify smoke test results
        run: |
          if [ -f "samples/${{ matrix.variant }}/smoke-results.json" ]; then
            echo "Smoke test results found for ${{ matrix.variant }}"
            uv run python -m json.tool samples/${{ matrix.variant }}/smoke-results.json

            # Check for failures in smoke tests (modules is a dict keyed by module name)
            FAILURES=$(uv run python -c "import json,sys;d=json.load(open(sys.argv[1],encoding='utf-8'));m=d.get('modules',{});items=m.items() if isinstance(m,dict) else [(x.get('name','?'),x) for x in m];print(sum(1 for _,x in items if isinstance(x,dict) and x.get('status') in ('failed','error')))" "samples/${{ matrix.variant }}/smoke-results.json")

            if [ "$FAILURES" -gt 0 ]; then
              echo "Error: $FAILURES smoke test(s) failed for ${{ matrix.variant }}"
              exit 1
            fi

            echo "All smoke tests passed for ${{ matrix.variant }}"
          else
            echo "Warning: No smoke test results found for ${{ matrix.variant }}"
          fi

      - name: Generate job summary
        if: always()
        run: |
          echo "## Sample Validation: ${{ matrix.variant }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f "samples/${{ matrix.variant }}/smoke-results.json" ]; then
            uv run python - "samples/${{ matrix.variant }}/smoke-results.json" "$GITHUB_STEP_SUMMARY" <<'PY'
          import json, sys
          from pathlib import Path

          results_file = Path(sys.argv[1])
          summary_file = Path(sys.argv[2])

          data = json.load(results_file.open())
          modules = data.get("modules", {})
          if isinstance(modules, dict):
              module_items = list(modules.items())
          else:
              module_items = [
                  (module.get("name", "Unknown"), module) for module in modules
              ]

          with summary_file.open("a") as f:
              f.write("### Module Smoke Test Results\n\n")
              f.write("| Module | Status | Duration |\n")
              f.write("|--------|--------|----------|\n")

              for name, module in module_items:
                  status = module.get("status", "UNKNOWN")
                  duration = module.get("duration", module.get("duration_seconds", 0))

                  status_emoji = (
                      "✅"
                      if status == "passed"
                      else "⏭️"
                      if status == "skipped"
                      else "❌"
                  )
                  f.write(f"| {name} | {status_emoji} {status} | {duration:.2f}s |\n")

              f.write("\n")
          PY
          else
            echo "No smoke test results available" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload render logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: render-logs-${{ matrix.variant }}
          path: |
            samples/${{ matrix.variant }}/metadata.json
            samples/${{ matrix.variant }}/smoke-results.json
            samples/${{ matrix.variant }}/doc-publish.json
            samples/${{ matrix.variant }}/render/.riso/quality-durations.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload successful render artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: render-success-${{ matrix.variant }}
          path: |
            samples/${{ matrix.variant }}/smoke-results.json
            samples/${{ matrix.variant }}/metadata.json
          if-no-files-found: warn
          retention-days: 7

  web-tests:
    name: Web UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Run tests
        working-directory: web
        run: pnpm test:run
      - name: Lint
        working-directory: web
        run: pnpm lint
      - name: Build
        working-directory: web
        run: pnpm build
      - name: Install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: web
        run: pnpm exec playwright test --project=chromium
