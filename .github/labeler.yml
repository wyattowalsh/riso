# PR Labeler configuration
# See: https://github.com/actions/labeler

# Template-related changes
template:
  - changed-files:
      - any-glob-to-any-file:
          - "template/**/*"
          - "copier.yml"

# Hook scripts
hooks:
  - changed-files:
      - any-glob-to-any-file:
          - "template/hooks/**/*"

# Automation scripts
scripts:
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/**/*"

# Test files
tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**/*"
          - "conftest.py"
          - "pytest.ini"

# Documentation
docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**/*"
          - "*.md"
          - "**/*.md"
          - "!CHANGELOG.md"

# CI/CD configuration
ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**/*"

# Dependencies
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "pyproject.toml"
          - "package.json"
          - "pnpm-lock.yaml"
          - "uv.lock"
          - "requirements*.txt"

# Code quality tooling
quality:
  - changed-files:
      - any-glob-to-any-file:
          - ".pre-commit-config.yaml"
          - ".commitlintrc.yml"
          - ".releaserc.yml"
          - ".ruff.toml"
          - "ruff.toml"
          - ".pylintrc"
          - "pyrightconfig.json"

# Python files
python:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.py"
          - "pyproject.toml"

# Jinja templates
jinja:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.jinja"
          - "**/*.jinja2"
          - "**/*.j2"

# YAML configuration
yaml:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.yml"
          - "**/*.yaml"

# Makefile
makefile:
  - changed-files:
      - any-glob-to-any-file:
          - "Makefile"
          - "makefile"
          - "**/*.mk"

# Sample projects
samples:
  - changed-files:
      - any-glob-to-any-file:
          - "samples/**/*"

# Specification documents
specs:
  - changed-files:
      - any-glob-to-any-file:
          - "specs/**/*"

# Release-related changes
release:
  - changed-files:
      - any-glob-to-any-file:
          - ".releaserc.yml"
          - "CHANGELOG.md"
          - ".github/workflows/release.yml"
          - ".github/release-drafter.yml"
