  choices:
    - github-actions
    - gitlab-ci
    - circleci
    - none

# ========================================
# SaaS Modular Architecture
# Split into independent layers that can be enabled separately
# ========================================

# ----------------------------------------
# SaaS Infrastructure Layer
# Core infrastructure: runtime, hosting, database, ORM
# ----------------------------------------
saas_infra_module:
  type: str
  help: |
    Enable SaaS Infrastructure layer?
    Sets up: Next.js/Remix runtime, Vercel/Cloudflare hosting, database, ORM.
    This is the foundation layer - required before enabling auth or billing.
  default: disabled
  choices:
    - enabled
    - disabled

saas_runtime:
  type: str
  help: |
    Select runtime framework:
    - Next.js 16: React 19.2, App Router, Turbopack, largest ecosystem
    - Remix 2.x: Server-first routes, explicit data loading, forms
  default: nextjs-16
  choices:
    - nextjs-16
    - remix-2
  when: "{{ saas_infra_module == 'enabled' }}"

saas_hosting:
  type: str
  help: |
    Select hosting platform:
    - Vercel: Native Next.js support, edge functions, preview deployments
    - Cloudflare: Global edge network, Pages + Workers, lower egress
  default: vercel
  choices:
    - vercel
    - cloudflare
  when: "{{ saas_infra_module == 'enabled' }}"

saas_database:
  type: str
  help: |
    Select database provider:
    - Neon: Serverless Postgres, branching, autoscale-to-zero
    - Supabase: Postgres + Auth + Storage + Edge Functions
  default: neon
  choices:
    - neon
    - supabase
  when: "{{ saas_infra_module == 'enabled' }}"

saas_orm:
  type: str
  help: |
    Select ORM for database access:
    - Prisma: Best TypeScript ergonomics, schema DSL, Prisma Studio
    - Drizzle: Lightweight, SQL-like syntax, edge-optimized
  default: prisma
  choices:
    - prisma
    - drizzle
  when: "{{ saas_infra_module == 'enabled' }}"

# ----------------------------------------
# SaaS Auth Layer (requires infra)
# Authentication and authorization
# ----------------------------------------
saas_auth_module:
  type: str
  help: |
    Enable SaaS Authentication layer?
    Requires saas_infra_module. Sets up user auth, sessions, and roles.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ saas_infra_module == 'enabled' }}"

saas_auth_provider:
  type: str
  help: |
    Select authentication provider:
    - Clerk: Hosted auth, built-in UI, organizations, passkeys
    - Auth.js: Self-hosted, open-source, full control
    - Lucia: Type-safe sessions, any database, full control
  default: clerk
  choices:
    - clerk
    - authjs
    - lucia
  when: "{{ saas_auth_module == 'enabled' }}"

saas_enterprise_bridge:
  type: str
  help: |
    Add enterprise authentication bridge (SSO, SCIM)?
    - WorkOS: Enterprise SSO (Okta, Azure AD), SCIM provisioning
    - None: Skip enterprise features for now
  default: none
  choices:
    - workos
    - none
  when: "{{ saas_auth_module == 'enabled' }}"

# ----------------------------------------
# SaaS Billing Layer (requires auth)
# Subscriptions and payments
# ----------------------------------------
saas_billing_module:
  type: str
  help: |
    Enable SaaS Billing layer?
    Requires saas_auth_module. Sets up subscriptions, payments, invoices.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ saas_auth_module == 'enabled' }}"

saas_billing_provider:
  type: str
  help: |
    Select billing provider:
    - Stripe: Full control, usage metering, widest ecosystem
    - Paddle: Merchant of Record, automatic tax/VAT
    - LemonSqueezy: MoR alternative, indie-hacker friendly
  default: stripe
  choices:
    - stripe
    - paddle
    - lemonsqueezy
  when: "{{ saas_billing_module == 'enabled' }}"

# ----------------------------------------
# SaaS App Layer (requires all above)
# Application features: jobs, email, analytics, AI
# ----------------------------------------
saas_app_module:
  type: str
  help: |
    Enable SaaS Application features?
    Requires saas_billing_module. Adds background jobs, email, analytics, AI.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ saas_billing_module == 'enabled' }}"

saas_jobs:
  type: str
  help: |
    Select background job system:
    - Trigger.dev: Task-centric, AI-optimized, built-in retries
    - Inngest: Event-driven workflows, durable execution
  default: triggerdev
  choices:
    - triggerdev
    - inngest
  when: "{{ saas_app_module == 'enabled' }}"

saas_email:
  type: str
  help: |
    Select email provider:
    - Resend: React Email templates, Vercel integration
    - Postmark: Industry-leading deliverability
  default: resend
  choices:
    - resend
    - postmark
  when: "{{ saas_app_module == 'enabled' }}"

saas_analytics:
  type: str
  help: |
    Select analytics platform:
    - PostHog: Product OS (analytics + flags + replay)
    - Amplitude: Enterprise analytics, cohorts
  default: posthog
  choices:
    - posthog
    - amplitude
  when: "{{ saas_app_module == 'enabled' }}"

saas_ai:
  type: str
  help: |
    Select AI provider:
    - OpenAI: GPT-4o/GPT-5, function calling
    - Anthropic: Claude 4.x, longer context windows
  default: openai
  choices:
    - openai
    - anthropic
  when: "{{ saas_infra_module == 'enabled' }}"

saas_storage:
  type: str
  help: |
    Select file storage provider:
    - Cloudflare R2: S3-compatible, zero egress fees, global edge network
    - Supabase Storage: Integrated with Supabase platform, RLS policies, image transformations
  default: r2
  choices:
    - r2
    - supabase-storage
  when: "{{ saas_infra_module == 'enabled' }}"

saas_cicd:
  type: str
  help: |
    Select CI/CD platform:
    - GitHub Actions: Native GitHub integration, marketplace actions, deploy to Vercel
    - Cloudflare CI: Integrated with Cloudflare Pages/Workers, fast edge deployments
  default: github-actions
  choices:
    - github-actions
    - cloudflare-ci
  when: "{{ saas_infra_module == 'enabled' }}"

saas_observability_sentry:
  type: bool
  help: Enable Sentry for error tracking?
  default: true
  when: "{{ saas_infra_module == 'enabled' }}"

saas_observability_datadog:
  type: bool
  help: Enable Datadog for APM (Application Performance Monitoring)?
  default: true
  when: "{{ saas_infra_module == 'enabled' }}"

saas_observability_otel:
  type: bool
  help: Enable OpenTelemetry instrumentation for traces and metrics?
  default: true
  when: "{{ saas_infra_module == 'enabled' }}"

saas_observability_structured_logging:
  type: bool
  help: Enable structured JSON logging with correlation IDs?
  default: true
  when: "{{ saas_infra_module == 'enabled' }}"

saas_include_fixtures:
  type: bool
  help: |
    Include seeded database fixtures with example users, organizations, and subscriptions?
  default: true
  when: "{{ saas_infra_module == 'enabled' }}"

saas_include_factories:
  type: bool
  help: |
    Include test data factories (Faker.js integration) for generating realistic test data?
  default: true
  when: "{{ saas_infra_module == 'enabled' }}"

saas_test_suite_level:
  type: str
  help: |
    Select test suite coverage level:
    - Standard: Unit tests + integration tests for all services
    - Comprehensive: Standard + E2E tests for critical user flows (signup, billing, dashboard)
  default: standard
  choices:
    - standard
    - comprehensive
  when: "{{ saas_infra_module == 'enabled' }}"

# ============================================================================
# Application-Level Scaffolding Options
# These options generate actual business logic and UI components
# ============================================================================

saas_multi_tenancy_level:
  type: str
  help: "Multi-tenancy support level (enterprise adds tenant isolation, SAML scaffolding)"
  default: teams
  choices:
    - none
    - teams
    - enterprise
  when: "{{ saas_infra_module == 'enabled' }}"

saas_tenancy_model:
  type: str
  help: |
    Select tenancy model for your SaaS application:
    - B2B Teams: Organization-centric with team workspaces, seat-based billing, team invites,
      shared resources, and organization switching. Best for collaboration tools, project
      management, and enterprise software.
    - B2C Users: User-centric with individual accounts, personal subscriptions, no team
      features. Best for consumer apps, personal productivity tools, and individual SaaS.
  default: b2b-teams
  choices:
    - b2b-teams
    - b2c-users
  when: "{{ saas_infra_module == 'enabled' }}"

saas_rbac_system:
  type: str
  help: |
    Select role-based access control (RBAC) system:
    - Basic Roles: Fixed owner/admin/member roles with hardcoded permissions. Simple,
      predictable, covers 80% of use cases. No admin UI needed.
    - Custom Permissions: Dynamic permission system with role management UI, granular
      access control, and permission inheritance. Best for enterprise or complex access needs.
  default: basic-roles
  choices:
    - basic-roles
    - custom-permissions
  when: "{{ saas_infra_module == 'enabled' }}"

saas_onboarding:
  type: str
  help: |
    Include user onboarding flow scaffolding?
    - Wizard: Multi-step guided setup with progress indicator, data collection, and
      completion tracking. Great for complex products requiring initial configuration.
    - Checklist: Dashboard checklist with completion tracking and contextual prompts.
      Non-blocking, lets users explore while guiding them to key actions.
    - None: No onboarding scaffolding. Users land directly on the dashboard.
  default: wizard
  choices:
    - wizard
    - checklist
    - none
  when: "{{ saas_infra_module == 'enabled' }}"

include_admin:
  type: bool
  help: "Include admin dashboard scaffolding (user management, subscriptions, audit logs)"
  default: false
  when: "{{ saas_infra_module == 'enabled' }}"

saas_admin_dashboard:
  type: bool
  help: |
    Include admin dashboard scaffolding? Generates:
    - Admin-only routes with role-based authentication
    - User management (list, search, view details, suspend accounts)
    - Organization management (for B2B) or subscription overview (for B2C)
    - User impersonation for debugging customer issues
    - Basic metrics dashboard (signups, active users, revenue)
  default: true
  when: "{{ saas_infra_module == 'enabled' }}"

saas_user_impersonation:
  type: bool
  help: |
    Enable user impersonation for admin users? Allows admins to:
    - View the app as any user for debugging and support
    - Audit trail of all impersonation sessions
    - Clear visual indicator when impersonating
    Requires saas_admin_dashboard to be enabled.
  default: true
  when: "{{ saas_app_module == 'enabled' and saas_admin_dashboard }}"

saas_notifications:
  type: str
  help: |
    Select notification system scaffolding:
    - Both: Real-time in-app notification center + email notifications with preferences.
      Includes notification bell component, WebSocket/SSE delivery, and email digests.
    - Email Only: Email notifications only. Simpler architecture, no real-time component.
    - None: No notification scaffolding. You'll implement notifications manually.
  default: both
  choices:
    - both
    - email-only
    - none
  when: "{{ saas_infra_module == 'enabled' }}"

saas_waitlist:
  type: bool
  help: |
    Include pre-launch waitlist scaffolding? Generates:
    - Waitlist landing page with email capture
    - Invite code system with limited-use codes
    - Referral tracking (who invited whom)
    - Admin panel for managing waitlist and sending invites
    Best for validating demand before full launch.
  default: false
  when: "{{ saas_infra_module == 'enabled' }}"

saas_search_provider:
  type: str
  help: "Search provider for content indexing"
  default: none
  choices:
    - none
    - meilisearch
    - algolia
  when: "{{ saas_infra_module == 'enabled' }}"

saas_i18n:
  type: bool
  help: |
    Enable internationalization support with next-intl.
    Include internationalization (i18n) scaffolding? Generates:
    - next-intl (Next.js) or remix-i18next (Remix) configuration
    - Default English locale with placeholder translations
    - Language switcher component in navigation
    - Date, number, and currency formatting utilities
    - Translation key extraction setup
  default: false
  when: "{{ saas_infra_module == 'enabled' }}"

saas_api_access:
  type: str
  help: |
    Select API access model for your SaaS:
    - Public API: Full API key management with user-facing UI, rate limiting dashboard,
      usage tracking, and auto-generated API documentation. Best for developer platforms.
    - Internal Only: API routes exist but for internal use only. No API key management UI.
      Users interact via web interface only.
  default: internal-only
  choices:
    - public-api
    - internal-only
  when: "{{ saas_infra_module == 'enabled' }}"

# ============================================================================
# UI & Frontend Options
# ============================================================================

saas_ui_framework:
  type: str
  help: |
    Select UI component framework:
    - shadcn-ui: Copy-paste components built on Radix, full customization, Tailwind-native.
      Best for: Custom designs, full control over styling.
    - Radix Primitives: Unstyled accessible primitives, bring your own styles.
      Best for: Design systems, maximum flexibility.
    - Headless UI: Tailwind Labs components, simpler API, good defaults.
      Best for: Quick prototypes, Tailwind-first teams.
  default: shadcn-ui
  choices:
    - shadcn-ui
    - radix-primitives
    - headless-ui
  when: "{{ saas_infra_module == 'enabled' }}"

saas_form_library:
  type: str
  help: |
    Select form handling library:
    - React Hook Form: Performance-focused, minimal re-renders, Zod integration.
    - Conform: Remix-native, progressive enhancement, server validation.
    - None: Manual form handling with native React.
  default: react-hook-form
  choices:
    - react-hook-form
    - conform
    - none
  when: "{{ saas_infra_module == 'enabled' }}"

# ============================================================================
# Real-time & Communication
# ============================================================================

saas_realtime:
  type: str
  help: |
    Select real-time communication provider:
    - Socket.io: Self-hosted, full control, works with any backend.
    - Pusher: Industry standard, channels/presence, easy setup, generous free tier.
    - Ably: Enterprise-grade, message history, global edge network.
    - Supabase Realtime: Integrated with Supabase, Postgres changes, presence.
    - None: No real-time features (polling or SSE only).
  default: none
  choices:
    - socketio
    - pusher
    - ably
    - supabase-realtime
    - none
  when: "{{ saas_infra_module == 'enabled' }}"

# ============================================================================
# Marketing & Growth
# ============================================================================

saas_landing_page:
  type: bool
  help: |
    Include marketing landing page scaffolding? Generates:
    - Hero section with CTA
    - Features grid
    - Pricing table (connected to billing plans)
    - Testimonials section
    - FAQ accordion
    - Footer with links
  default: true
  when: "{{ saas_infra_module == 'enabled' }}"

saas_blog:
  type: bool
  help: |
    Include MDX blog scaffolding? Generates:
    - Blog listing page
    - Individual post pages with MDX support
    - Author profiles
    - Categories/tags
    - RSS feed
    - SEO metadata
  default: false
  when: "{{ saas_infra_module == 'enabled' }}"

saas_changelog_public:
  type: bool
  help: |
    Include public changelog page? Generates:
    - Changelog listing from MDX files
    - Version badges (new, improved, fixed)
    - Subscribe to updates
    - RSS feed for changelog
  default: false
  when: "{{ saas_infra_module == 'enabled' }}"

# ============================================================================
# Security & Compliance
# ============================================================================

saas_2fa:
  type: bool
  help: |
    Include two-factor authentication (2FA) scaffolding? Generates:
    - TOTP setup flow (Google Authenticator, Authy compatible)
    - Backup codes generation and storage
    - 2FA enforcement settings per organization
    - Recovery flow
    Note: Clerk has built-in 2FA. This adds custom 2FA for Auth.js.
  default: false
  when: "{{ saas_auth_module == 'enabled' and saas_auth_provider == 'authjs' }}"

saas_compliance_level:
  type: str
  help: "Compliance requirements level"
  default: basic
  choices:
    - basic
    - gdpr
    - hipaa
    - soc2
  when: "{{ saas_infra_module == 'enabled' }}"

saas_gdpr_tools:
  type: bool
  help: |
    Include GDPR compliance tools? Generates:
    - Data export endpoint (download all user data as JSON/ZIP)
    - Account deletion flow with grace period
    - Cookie consent banner
    - Privacy preference center
    - Data processing records
  default: false
  when: "{{ saas_infra_module == 'enabled' }}"

# ============================================================================
# Developer Experience
# ============================================================================

saas_ai_features:
  type: str
  help: "AI integration level (full includes RAG with pgvector)"
  default: none
  choices:
    - none
    - basic
    - rag
    - full
  when: "{{ saas_infra_module == 'enabled' }}"

vector_db_provider:
  type: str
  help: |
    Vector database for AI/RAG features:
    - none: No vector database (for non-RAG AI features)
    - pinecone: Managed vector database with high performance
    - qdrant: Open-source vector database, self-hostable
    - weaviate: GraphQL-based vector database with rich semantics
  default: none
  choices:
    - none
    - pinecone
    - qdrant
    - weaviate
  when: "{{ saas_ai_features in ['rag', 'full'] }}"

embedding_provider:
  type: str
  help: |
    Embedding provider for vector database:
    - openai: OpenAI text-embedding-ada-002 or text-embedding-3
    - cohere: Cohere embed-english-v3.0 or embed-multilingual-v3.0
  default: openai
  choices:
    - openai
    - cohere
  when: "{{ vector_db_provider != 'none' }}"

saas_api_docs:
  type: bool
  help: |
    Include API documentation generation? Generates:
    - OpenAPI 3.1 schema from route handlers
    - Swagger UI at /api/docs
    - TypeScript client generation script
    - API versioning support
  default: false
  when: "{{ saas_app_module == 'enabled' and saas_api_access == 'public-api' }}"

saas_rate_limiting:
  type: str
  help: |
    Select rate limiting implementation:
    - Upstash: Redis-based, serverless, sliding window, great for edge.
    - Built-in: In-memory rate limiting (resets on deploy, single-instance only).
    - None: No rate limiting (handle at infrastructure level).
  default: upstash
  choices:
    - upstash
    - built-in
    - none
  when: "{{ saas_infra_module == 'enabled' }}"

saas_file_upload:
  type: str
  help: |
    Select file upload widget:
    - UploadThing: Type-safe uploads, built for Next.js, S3-compatible backend.
    - React Dropzone: Flexible, bring your own backend, more control.
    - None: Manual file input handling.
  default: uploadthing
  choices:
    - uploadthing
    - react-dropzone
    - none
  when: "{{ saas_infra_module == 'enabled' }}"

_exclude:
  # Static excludes - never copy these (template-level files, not project files)
  - ".git"
  - "README.md"
  - "specs/"
  - "config/"
  - "samples/"
  - "prompts/"
  - "hooks/"
  - "COMPARISON_PAGE.md"
  - ".DS_Store"
  # Note: .github/ and scripts/ are now at template/files/ root and SHOULD be
  # copied to generated projects (they contain workflows and setup scripts)

  # ========================================
  # CI/CD Platform Exclusions
  # ========================================

  # GitHub Actions - exclude if not using github-actions
  - "{% if ci_platform != 'github-actions' %}.github/workflows/{% endif %}"

  # GitLab CI - exclude if not using gitlab-ci
  - "{% if ci_platform != 'gitlab-ci' %}.gitlab/{% endif %}"

  # CircleCI - exclude if not using circleci
  - "{% if ci_platform != 'circleci' %}.circleci/{% endif %}"

  # ========================================
  # Component-Based Language Directory Exclusions
  # ========================================

  # Python directory - include if ANY Python component enabled
  # api_languages is now a list supporting multiselect
  - "{% if not ((cli_module == 'enabled' and 'python' in cli_languages) or (api_module == 'enabled' and 'python' in api_languages) or (mcp_module == 'enabled' and 'python' in mcp_languages) or (docs_module == 'enabled' and docs_framework == 'sphinx-shibuya')) %}python/{% endif %}"

  # Rust directory - include if ANY Rust component enabled
  - "{% if not ((cli_module == 'enabled' and 'rust' in cli_languages) or (api_module == 'enabled' and 'rust' in api_languages) or (mcp_module == 'enabled' and 'rust' in mcp_languages)) %}rust/{% endif %}"

  # Node directory - include if ANY Node/TypeScript component enabled
  - "{% if not ((api_module == 'enabled' and 'node' in api_languages) or (mcp_module == 'enabled' and 'typescript' in mcp_languages) or (docs_module == 'enabled' and docs_framework in ['fumadocs', 'docusaurus']) or saas_infra_module == 'enabled') %}node/{% endif %}"

  # Go directory - include if ANY Go component enabled
  # Go 1.24+ with Cobra CLI, Gin/Fiber/Echo/Chi API, koanf config, slog logging
  - "{% if not ((cli_module == 'enabled' and 'go' in cli_languages) or (api_module == 'enabled' and 'go' in api_languages) or (mcp_module == 'enabled' and 'go' in mcp_languages)) %}go/{% endif %}"

  # Frontend directory - include only if SaaS enabled
  - "{% if saas_infra_module != 'enabled' %}frontend/{% endif %}"

  # Electron directory - include only if desktop module enabled
  - "{% if desktop_module != 'enabled' %}electron/{% endif %}"

  # Tauri directory - include only for Tauri desktop projects
  - "{% if not (desktop_module == 'enabled' and desktop_framework == 'tauri') %}tauri/{% endif %}"

  # Shared build configs - include only when a JS-facing surface is enabled
  - "{% if not (saas_infra_module == 'enabled' or desktop_module == 'enabled' or (docs_module == 'enabled' and docs_framework in ['fumadocs', 'docusaurus'])) %}build/{% endif %}"

  # E2E testing scaffold - include only when a generated runtime needs it
  - "{% if not (api_module == 'enabled' or saas_app_module == 'enabled' or desktop_module == 'enabled' or docs_module == 'enabled') %}testing/{% endif %}"

  # ========================================
  # Desktop Framework Exclusions
  # ========================================

  # Exclude specific desktop framework implementations
  - "{% if not (desktop_module == 'enabled' and desktop_framework == 'electron-vite') %}electron/electron-vite/{% endif %}"
  - "{% if not (desktop_module == 'enabled' and desktop_framework == 'electron-forge') %}electron/electron-forge/{% endif %}"
  - "{% if not (desktop_module == 'enabled' and desktop_framework == 'tauri') %}electron/tauri/{% endif %}"

  # ========================================
  # Documentation Framework Exclusions
  # ========================================

  # Fumadocs - exclude if not using fumadocs
  - "{% if not (docs_module == 'enabled' and docs_framework == 'fumadocs') %}node/docs/fumadocs/{% endif %}"

  # Docusaurus - exclude if not using docusaurus
  - "{% if not (docs_module == 'enabled' and docs_framework == 'docusaurus') %}node/docs/docusaurus/{% endif %}"

  # Sphinx - exclude if not using sphinx-shibuya
  - "{% if not (docs_module == 'enabled' and docs_framework == 'sphinx-shibuya') %}python/docs/{% endif %}"

  # MkDocs - exclude if not using mkdocs (placeholder for future mkdocs templates)
  - "{% if not (docs_module == 'enabled' and docs_framework == 'mkdocs') %}python/mkdocs/{% endif %}"

  # ========================================
  # Component-Specific Subdirectory Exclusions
  # ========================================

  # Python MCP - exclude if not using Python MCP
  - "{% if not (mcp_module == 'enabled' and 'python' in mcp_languages) %}python/mcp/{% endif %}"

  # Rust MCP - exclude if not using Rust MCP
  - "{% if not (mcp_module == 'enabled' and 'rust' in mcp_languages) %}rust/mcp/{% endif %}"

  # TypeScript MCP - exclude if not using TypeScript MCP
  - "{% if not (mcp_module == 'enabled' and 'typescript' in mcp_languages) %}node/mcp/{% endif %}"

  # Go MCP - exclude if not using Go MCP
  - "{% if not (mcp_module == 'enabled' and 'go' in mcp_languages) %}go/mcp/{% endif %}"

  # Go CLI - exclude if not using Go CLI
  - "{% if not (cli_module == 'enabled' and 'go' in cli_languages) %}go/cli/{% endif %}"

  # Go API - exclude if not using Go API
  - "{% if not (api_module == 'enabled' and 'go' in api_languages) %}go/api/{% endif %}"

  # Python GraphQL - exclude if not using GraphQL with Python API
  - "{% if not (api_module == 'enabled' and 'python' in api_languages and 'graphql' in api_features) %}python/graphql_api/{% endif %}"
  - "{% if not (api_module == 'enabled' and 'python' in api_languages and 'graphql' in api_features) %}graphql/{% endif %}"
  - "{% if not (api_module == 'enabled' and 'python' in api_languages and 'graphql' in api_features) %}tests/graphql/{% endif %}"

  # Node API - exclude if not using Node API
  - "{% if not (api_module == 'enabled' and 'node' in api_languages) %}node/apps/api-node/{% endif %}"

  # SaaS - exclude if SaaS infra not enabled
  - "{% if saas_infra_module != 'enabled' %}node/saas/{% endif %}"
  - "{% if saas_infra_module != 'enabled' %}saas-starter/{% endif %}"

  # Optional shared module roots - exclude unless their component is enabled
  - "{% if mcp_module != 'enabled' %}mcp/{% endif %}"
  - "{% if shared_logic != 'enabled' %}logic/{% endif %}"
  - "{% if not (api_module == 'enabled' or shared_logic == 'enabled') %}tests/integration/test_inter_service.py{% endif %}"

  # Root Node package/workspace files - exclude when no Node-backed surface renders
  - "{% if not ((api_module == 'enabled' and 'node' in api_languages) or (mcp_module == 'enabled' and 'typescript' in mcp_languages) or (docs_module == 'enabled' and docs_framework in ['fumadocs', 'docusaurus']) or saas_infra_module == 'enabled' or desktop_module == 'enabled' or changelog_module == 'enabled') %}package.json{% endif %}"
  - "{% if not ((api_module == 'enabled' and 'node' in api_languages) or (mcp_module == 'enabled' and 'typescript' in mcp_languages) or (docs_module == 'enabled' and docs_framework in ['fumadocs', 'docusaurus']) or saas_infra_module == 'enabled' or desktop_module == 'enabled' or changelog_module == 'enabled') %}pnpm-workspace.yaml{% endif %}"
  - "{% if not ((api_module == 'enabled' and 'node' in api_languages) or (mcp_module == 'enabled' and 'typescript' in mcp_languages) or (docs_module == 'enabled' and docs_framework in ['fumadocs', 'docusaurus']) or saas_infra_module == 'enabled' or desktop_module == 'enabled' or changelog_module == 'enabled') %}node/pnpm-workspace.yaml{% endif %}"

  # Release files - exclude unless changelog/release automation is enabled
  - "{% if changelog_module != 'enabled' %}.commitlintrc.yml{% endif %}"
  - "{% if changelog_module != 'enabled' %}.releaserc.yml{% endif %}"
  - "{% if changelog_module != 'enabled' %}.github/workflows/riso-release.yml{% endif %}"
  - "{% if changelog_module != 'enabled' %}scripts/release/{% endif %}"
  - "{% if changelog_module != 'enabled' %}python/release/{% endif %}"
  - "{% if changelog_module != 'enabled' %}node/release/{% endif %}"

  # Module documentation - exclude docs for disabled modules
  - "{% if cli_module != 'enabled' %}docs/modules/cli.md{% endif %}"
  - "{% if api_module != 'enabled' %}docs/modules/api-fastapi.md{% endif %}"
  - "{% if api_module != 'enabled' %}docs/modules/api-node.md{% endif %}"
  - "{% if api_module != 'enabled' %}docs/modules/api-python.md{% endif %}"
  - "{% if not (api_module == 'enabled' and 'graphql' in api_features) %}docs/modules/graphql.md{% endif %}"
  - "{% if not (api_module == 'enabled' and 'websocket' in api_features) %}docs/modules/websockets.md{% endif %}"
  - "{% if mcp_module != 'enabled' %}docs/modules/mcp.md{% endif %}"
  - "{% if shared_logic != 'enabled' %}docs/modules/shared-logic.md{% endif %}"
  - "{% if codegen_module != 'enabled' %}docs/modules/codegen-scaffolding.md{% endif %}"
  - "{% if changelog_module != 'enabled' %}docs/modules/changelog-release.md{% endif %}"
  - "{% if docs_module != 'enabled' %}docs/modules/docs-site.md{% endif %}"
  - "{% if saas_infra_module != 'enabled' %}docs/modules/saas-starter.md{% endif %}"

  # ========================================
  # SaaS Feature Exclusions
  # ========================================

  # RAG integration - exclude if not using RAG features
  - "{% if not (saas_ai_features in ['rag', 'full'] and vector_db_provider != 'none') %}node/saas/integrations/ai/rag/{% endif %}"

  # Search integration - exclude if search provider is none
  - "{% if saas_search_provider == 'none' %}node/saas/integrations/search/{% endif %}"
  - "{% if saas_search_provider == 'none' %}node/saas/components/search/{% endif %}"

  # ========================================
  # Root Config File Exclusions
  # ========================================

  # pyproject.toml - include if any Python component enabled
  - "{% if not ((cli_module == 'enabled' and 'python' in cli_languages) or (api_module == 'enabled' and 'python' in api_languages) or (mcp_module == 'enabled' and 'python' in mcp_languages)) %}pyproject.toml{% endif %}"

  # Cargo.toml - include if any Rust component enabled
  - "{% if not ((cli_module == 'enabled' and 'rust' in cli_languages) or (api_module == 'enabled' and 'rust' in api_languages) or (mcp_module == 'enabled' and 'rust' in mcp_languages)) %}rust/Cargo.toml{% endif %}"

_tasks:
  - command:
      - "{{ _copier_python }}"
      - "-c"
      - |
        import pathlib
        import runpy

        src_path = pathlib.Path({{ _copier_conf.src_path | to_json }})
        candidates = (
            src_path / "hooks" / "post_gen_project.py",
            src_path / "template" / "hooks" / "post_gen_project.py",
            src_path.parent / "hooks" / "post_gen_project.py",
        )
        for candidate in candidates:
            if candidate.exists():
                runpy.run_path(str(candidate), run_name="__main__")
                break
        else:
            raise SystemExit("Riso post-generation hook not found")
    when: "{{ _copier_operation == 'copy' }}"
