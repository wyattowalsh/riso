_min_copier_version: "9.1.0"
_template: "."
_faq: true
_answers_file: ".copier-answers.yml"

metadata:
  name: "riso-template"
  version: "0.1.0"
  description: >
    Riso is a modular Copier template that defaults to a lightweight Python 3.11
    stack (uv, pytest, jupyter, ruff, ty, pylint) and offers opt-in Typer CLI,
    FastAPI/Fastify services, fastmcp integrations, shared logic, and documentation
    variants powered by Fumadocs (Next.js), Sphinx Shibuya, and Docusaurus.
  maintainers:
    - "Riso Template Working Group"
  tags:
    - python
    - typer
    - fastapi
    - fastify
    - uv
    - pnpm
    - fumadocs
    - sphinx-shibuya
    - docusaurus

defaults:
  project_name: "riso-example"
  project_slug: "{{ project_name | replace(' ', '-') | lower }}"
  package_name: "{{ project_slug | replace('-', '_') }}"
  project_layout: "single-package"
  quality_profile: "standard"
  python_versions: ["3.11", "3.12", "3.13"]
  cli_module: "disabled"
  api_tracks: "none"
  graphql_api_module: "disabled"
  mcp_module: "disabled"
  websocket_module: "disabled"
  codegen_module: "disabled"
  changelog_module: "disabled"
  docs_site: "fumadocs"
  # Fumadocs configuration defaults
  fumadocs_search_provider: "orama"
  fumadocs_llms_txt: "enabled"
  fumadocs_ai_search: "disabled"
  fumadocs_openapi: "enabled"
  fumadocs_typedoc: "disabled"
  fumadocs_theme: "default"
  fumadocs_sidebar: "default"
  fumadocs_i18n: "disabled"
  fumadocs_blog: "disabled"
  # Docusaurus configuration defaults
  docusaurus_search_provider: "local"
  docusaurus_analytics: "none"
  docusaurus_theme: "classic"
  docusaurus_llms_txt: "enabled"
  docusaurus_i18n: "disabled"
  docusaurus_versioning: "disabled"
  docusaurus_blog: "enabled"
  docusaurus_faster: "enabled"
  docusaurus_openapi: "enabled"
  # Docusaurus content enhancements
  docusaurus_mermaid: "enabled"
  docusaurus_math: "disabled"
  docusaurus_live_codeblock: "disabled"
  docusaurus_show_last_update: "enabled"
  # Docusaurus media
  docusaurus_ideal_images: "enabled"
  docusaurus_image_zoom: "disabled"
  # Docusaurus PWA & community
  docusaurus_pwa: "disabled"
  docusaurus_comments: "none"
  docusaurus_feedback: "disabled"
  # Docusaurus SEO & UI
  docusaurus_sitemap: "enabled"
  docusaurus_redirects: "disabled"
  docusaurus_announcement_bar: "disabled"
  docusaurus_back_to_top: "enabled"
  docusaurus_edit_url: "enabled"
  docusaurus_code_tabs: "disabled"
  docusaurus_changelog: "disabled"
  docusaurus_debug: "disabled"
  docusaurus_reading_time: "enabled"
  # Other defaults
  shared_logic: "disabled"
  ci_platform: "github-actions"
  saas_starter_module: "disabled"
  saas_runtime: "nextjs-16"
  saas_hosting: "vercel"
  saas_database: "neon"
  saas_orm: "prisma"
  saas_auth: "clerk"
  saas_enterprise_bridge: "none"
  saas_billing: "stripe"
  saas_jobs: "triggerdev"
  saas_email: "resend"
  saas_analytics: "posthog"
  saas_ai: "openai"
  saas_storage: "r2"
  saas_cicd: "github-actions"
  saas_observability_sentry: true
  saas_observability_datadog: true
  saas_observability_otel: true
  saas_observability_structured_logging: true
  saas_include_fixtures: true
  saas_include_factories: true
  saas_test_suite_level: "standard"

prompts:
  project_name:
    type: str
    help: "Human friendly project name"
  project_layout:
    type: str
    help: "Choose the repository layout"
    choices:
      - single-package
      - monorepo
  quality_profile:
    type: str
    help: "Select baseline quality suite profile"
    choices:
      - standard
      - strict
  cli_module:
    type: str
    help: "Enable the Typer CLI scaffolding?"
    choices:
      - disabled
      - enabled
  api_tracks:
    type: str
    help: "Select API tracks to scaffold"
    choices:
      - none
      - python
      - node
      - python+node
  graphql_api_module:
    type: str
    help: "Enable GraphQL API scaffolding (Strawberry)?"
    choices:
      - disabled
      - enabled
    when: "{{ api_tracks in ['python', 'python+node'] }}"
  mcp_module:
    type: str
    help: "Enable fastmcp tooling module?"
    choices:
      - disabled
      - enabled
  websocket_module:
    type: str
    help: "Enable WebSocket real-time communication module?"
    choices:
      - disabled
      - enabled
    when: "{{ api_tracks in ['python', 'python+node'] }}"
  codegen_module:
    type: str
    help: "Enable code generation and scaffolding tools?"
  changelog_module:
    type: str
    help: "Enable changelog generation and release management?"
    choices:
      - disabled
      - enabled
  docs_site:
    type: str
    help: "Pick documentation variant"
    choices:
      - fumadocs
      - sphinx-shibuya
      - docusaurus
      - none
  
  # ========================================
  # Fumadocs Configuration Options
  # ========================================
  fumadocs_search_provider:
    type: str
    help: |
      Select search provider for Fumadocs:
      - orama: Built-in free search (default, self-hosted)
      - algolia: Hosted DocSearch, enterprise-grade
      - orama-cloud: Orama Cloud SDK for scaling
      - none: No search integration
    default: orama
    choices:
      - orama
      - algolia
      - orama-cloud
      - none
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_llms_txt:
    type: str
    help: |
      Enable llms.txt AI integration?
      Generates AI-friendly documentation endpoints:
      - /llms.txt (summary)
      - /llms-full.txt (complete docs)
      - /*.mdx (per-page markdown)
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_ai_search:
    type: str
    help: |
      Enable AI-powered search dialog?
      Scaffolds chat interface with Vercel AI SDK.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' and fumadocs_llms_txt == 'enabled' }}"

  fumadocs_openapi:
    type: str
    help: |
      Enable OpenAPI documentation integration?
      Auto-generates interactive API reference from specs.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' and api_tracks in ['python', 'node', 'python+node'] }}"

  fumadocs_typedoc:
    type: str
    help: |
      Enable TypeDoc SDK documentation?
      Generates TypeScript API docs from source.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' and api_tracks in ['node', 'python+node'] }}"

  fumadocs_theme:
    type: str
    help: |
      Select theming approach:
      - default: Fumadocs UI with neutral preset
      - ocean: Blue-toned ocean preset
      - purple: Purple accent preset
      - custom: Custom CSS variables (scaffold only)
    default: default
    choices:
      - default
      - ocean
      - purple
      - custom
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_sidebar:
    type: str
    help: |
      Select sidebar style:
      - default: Built-in Fumadocs sidebar
      - shadcn: Shadcn UI sidebar component
    default: default
    choices:
      - default
      - shadcn
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_i18n:
    type: str
    help: |
      Enable internationalization support?
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_blog:
    type: str
    help: |
      Enable blog/changelog section?
      Uses MDX content collection for posts.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  # ========================================
  # Docusaurus Configuration Options
  # ========================================
  docusaurus_search_provider:
    type: str
    help: |
      Select search provider for Docusaurus:
      - local: Offline full-text search (docusaurus-search-local)
      - algolia: Hosted DocSearch, best UX, requires API key
      - typesense: Self-hosted, privacy-focused search
      - none: No search integration
    default: local
    choices:
      - local
      - algolia
      - typesense
      - none
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_analytics:
    type: str
    help: |
      Select analytics for Docusaurus:
      - none: No analytics
      - posthog: Product analytics + session replay
      - google: Google Analytics 4
      - matomo: Privacy-focused, self-hosted option
    default: none
    choices:
      - none
      - posthog
      - google
      - matomo
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_theme:
    type: str
    help: |
      Select theming approach:
      - classic: Default Infima CSS framework
      - tailwind: Tailwind CSS v4 + utility-first styling
    default: classic
    choices:
      - classic
      - tailwind
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_llms_txt:
    type: str
    help: |
      Enable llms.txt plugin for AI-ready documentation?
      Generates concatenated docs for LLM consumption and RAG pipelines.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_i18n:
    type: str
    help: |
      Enable internationalization (i18n) support?
      Scaffolds locale config and translation workflow.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_versioning:
    type: str
    help: |
      Enable documentation versioning?
      Allows maintaining multiple doc versions (v1, v2, etc.)
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_blog:
    type: str
    help: |
      Enable blog functionality?
      Scaffolds blog directory with example posts and RSS/Atom feeds.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_faster:
    type: str
    help: |
      Enable Docusaurus Faster optimizations?
      Uses Rspack bundler, SWC, and LightningCSS for 2-4x faster builds.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_openapi:
    type: str
    help: |
      Enable OpenAPI documentation integration?
      Auto-generates API reference from OpenAPI specs.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' and api_tracks in ['python', 'node', 'python+node'] }}"

  # ----------------------------------------
  # Docusaurus Content Enhancements
  # ----------------------------------------
  docusaurus_mermaid:
    type: str
    help: |
      Enable Mermaid diagram support?
      Render flowcharts, sequence diagrams, ERDs, Gantt charts directly in markdown.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_math:
    type: str
    help: |
      Enable KaTeX math equation support?
      Render LaTeX math with $...$ (inline) and $$...$$ (block) syntax.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_live_codeblock:
    type: str
    help: |
      Enable live code playground?
      Interactive React code blocks that users can edit and run in the browser.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus Git & Metadata
  # ----------------------------------------
  docusaurus_show_last_update:
    type: str
    help: |
      Show last updated time on docs?
      Displays git-based "Last updated" timestamp and author on each page.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus Media & Assets
  # ----------------------------------------
  docusaurus_ideal_images:
    type: str
    help: |
      Enable ideal-image plugin?
      Responsive images with lazy loading and low-quality placeholders.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_image_zoom:
    type: str
    help: |
      Enable image zoom plugin?
      Medium-style click-to-zoom for documentation images.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus PWA & Offline
  # ----------------------------------------
  docusaurus_pwa:
    type: str
    help: |
      Enable Progressive Web App (PWA) support?
      Offline capability, app installation, and service worker caching.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus Community & Engagement
  # ----------------------------------------
  docusaurus_comments:
    type: str
    help: |
      Enable comments on documentation pages?
      - giscus: GitHub Discussions-powered comments (recommended)
      - none: No comments
    default: none
    choices:
      - giscus
      - none
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_feedback:
    type: str
    help: |
      Enable "Was this page helpful?" feedback widget?
      Collects reader feedback on documentation quality.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus SEO & Discovery
  # ----------------------------------------
  docusaurus_sitemap:
    type: str
    help: |
      Enable sitemap.xml generation?
      Improves search engine discoverability and crawling.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_redirects:
    type: str
    help: |
      Enable client-side redirects plugin?
      Handle URL changes and old page preservation gracefully.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus UI Enhancements
  # ----------------------------------------
  docusaurus_announcement_bar:
    type: str
    help: |
      Enable announcement bar at top of site?
      Ideal for new releases, events, or important notices.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_back_to_top:
    type: str
    help: |
      Enable back-to-top button?
      Floating button for quick scroll to page top.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_edit_url:
    type: str
    help: |
      Enable "Edit this page" links?
      Links to source file on GitHub for community contributions.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_code_tabs:
    type: str
    help: |
      Enable tabbed code blocks plugin?
      Group code samples by language with synchronized tab selection.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_changelog:
    type: str
    help: |
      Enable changelog integration?
      Include CHANGELOG.md as documentation page.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_debug:
    type: str
    help: |
      Enable debug plugin in development?
      Adds /__docusaurus/debug route for inspecting site data.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_reading_time:
    type: str
    help: |
      Show estimated reading time on docs/blog?
      Displays "X min read" based on word count.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  shared_logic:
    type: str
    help: "Generate shared logic package?"
    choices:
      - disabled
      - enabled
  include_databases:
    type: str
    help: "Include PostgreSQL and Redis services in docker-compose?"
    choices:
      - "no"
      - "yes"
    when: "{{ api_tracks in ['python', 'node', 'python+node'] }}"
  ci_platform:
    type: str
    help: "Select CI/CD platform"
    choices:
      - github-actions
      - none
  
  # ========================================
  # SaaS Starter Module Prompts
  # ========================================
  saas_starter_module:
    type: str
    help: |
      Enable SaaS Starter module? Generates production-ready SaaS application with
      authentication, billing, database, background jobs, email, analytics, AI, storage,
      observability, and deployment configuration. Choose your technology stack across
      14 categories with binary choices (2 options per category).
    default: disabled
    choices:
      - enabled
      - disabled
  
  saas_runtime:
    type: str
    help: |
      Select runtime framework for your SaaS application:
      - Next.js 16: React 19.2, App Router, Turbopack, largest ecosystem, Vercel-first
      - Remix 2.x: Server-first routes, explicit data loading, good for complex forms
    default: nextjs-16
    choices:
      - nextjs-16
      - remix-2
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_hosting:
    type: str
    help: |
      Select hosting platform:
      - Vercel: Native Next.js support, edge functions, image optimization, preview deployments
      - Cloudflare: Global edge network, Pages + Workers, lower egress costs, R2 storage
    default: vercel
    choices:
      - vercel
      - cloudflare
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_database:
    type: str
    help: |
      Select database provider:
      - Neon: Serverless Postgres, database branching, autoscale-to-zero, CI/PR databases
      - Supabase: Postgres + Auth + Storage + Edge Functions, all-in-one BaaS platform
    default: neon
    choices:
      - neon
      - supabase
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_orm:
    type: str
    help: |
      Select ORM for database access:
      - Prisma: Best TypeScript ergonomics, schema DSL, Prisma Studio, migration workflow
      - Drizzle: Lightweight, SQL-like syntax, edge-optimized, schema-as-code in TypeScript
    default: prisma
    choices:
      - prisma
      - drizzle
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_auth:
    type: str
    help: |
      Select authentication provider:
      - Clerk: Hosted auth, built-in UI components, organizations, passkeys, fastest setup
      - Auth.js: Self-hosted, open-source, full control, OAuth providers, lower cost
    default: clerk
    choices:
      - clerk
      - authjs
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_enterprise_bridge:
    type: str
    help: |
      Add enterprise authentication bridge (SSO, SCIM, Directory Sync)?
      - WorkOS: Enterprise-ready SSO (Okta, Azure AD, Google Workspace), SCIM provisioning
      - None: Skip enterprise features for now (pure PLG)
    default: none
    choices:
      - workos
      - none
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_billing:
    type: str
    help: |
      Select billing provider:
      - Stripe: Full control, usage metering, widest ecosystem, manual tax handling
      - Paddle: Merchant of Record (MoR), automatic tax/VAT, simpler compliance, higher fees
    default: stripe
    choices:
      - stripe
      - paddle
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_jobs:
    type: str
    help: |
      Select background job system:
      - Trigger.dev: Task-centric, AI-optimized, kicked off from your app, built-in retries
      - Inngest: Event-driven workflows, durable execution, complex orchestration, scheduling
    default: triggerdev
    choices:
      - triggerdev
      - inngest
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_email:
    type: str
    help: |
      Select email provider:
      - Resend: React Email templates, Vercel integration, modern DX, component-based
      - Postmark: Industry-leading deliverability, mature service, template management UI
    default: resend
    choices:
      - resend
      - postmark
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_analytics:
    type: str
    help: |
      Select analytics platform:
      - PostHog: Product OS (analytics + feature flags + session replay), open-source option
      - Amplitude: Enterprise product analytics, sophisticated cohorts, data warehouse integrations
    default: posthog
    choices:
      - posthog
      - amplitude
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_ai:
    type: str
    help: |
      Select AI provider:
      - OpenAI: GPT-4o/GPT-5, largest ecosystem, best for chat interfaces, function calling
      - Anthropic: Claude 4.x, longer context windows (200k+), better for document analysis
    default: openai
    choices:
      - openai
      - anthropic
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_storage:
    type: str
    help: |
      Select file storage provider:
      - Cloudflare R2: S3-compatible, zero egress fees, global edge network
      - Supabase Storage: Integrated with Supabase platform, RLS policies, image transformations
    default: r2
    choices:
      - r2
      - supabase-storage
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_cicd:
    type: str
    help: |
      Select CI/CD platform:
      - GitHub Actions: Native GitHub integration, marketplace actions, deploy to Vercel
      - Cloudflare CI: Integrated with Cloudflare Pages/Workers, fast edge deployments
    default: github-actions
    choices:
      - github-actions
      - cloudflare-ci
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_observability_sentry:
    type: bool
    help: Enable Sentry for error tracking?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_observability_datadog:
    type: bool
    help: Enable Datadog for APM (Application Performance Monitoring)?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_observability_otel:
    type: bool
    help: Enable OpenTelemetry instrumentation for traces and metrics?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_observability_structured_logging:
    type: bool
    help: Enable structured JSON logging with correlation IDs?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_include_fixtures:
    type: bool
    help: |
      Include seeded database fixtures with example users, organizations, and subscriptions?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_include_factories:
    type: bool
    help: |
      Include test data factories (Faker.js integration) for generating realistic test data?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_test_suite_level:
    type: str
    help: |
      Select test suite coverage level:
      - Standard: Unit tests + integration tests for all services
      - Comprehensive: Standard + E2E tests for critical user flows (signup, billing, dashboard)
    default: standard
    choices:
      - standard
      - comprehensive
    when: "{{ saas_starter_module == 'enabled' }}"

exclude:
  - ".git"
  - ".github"
  - "README.md"
  - "specs/"
  - "config/"
  - "samples/"
  - "scripts/"

tasks:
  post_init:
    - "scripts/hooks/post-init.sh {{ _copier_conf.answers_file }}"
