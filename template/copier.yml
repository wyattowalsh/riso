_min_copier_version: "9.1.0"
_template: "."
_subdirectory: "files"
_faq: true
_answers_file: ".copier-answers.yml"

_metadata:
  name: "riso-template"
  version: "2.0.0"
  description: >
    Riso is a component-first, polyglot Copier template supporting Python, TypeScript,
    Rust, and Go. Each component (CLI, API, MCP, Docs, SaaS) can be independently
    configured with its own language choice, enabling flexible combinations like
    Rust CLI + Python API + Fumadocs. Features modular SaaS scaffolding with
    opt-in auth, billing, and infrastructure layers.
  maintainers:
    - "Riso Template Working Group"
  tags:
    - polyglot
    - python
    - typescript
    - rust
    - typer
    - fastapi
    - fastify
    - actix
    - uv
    - pnpm
    - cargo
    - fumadocs
    - sphinx-shibuya
    - docusaurus
    - saas

_defaults:
  project_name: "riso-example"
  project_slug: "{{ project_name | replace(' ', '-') | lower }}"
  package_name: "{{ project_slug | replace('-', '_') }}"
  project_layout: "single-package"
  quality_profile: "standard"
  python_versions: ["3.11", "3.12", "3.13"]

  # ========================================
  # Component-First Module Defaults
  # Each component has its own language selector
  # ========================================

  # CLI Module
  cli_module: "disabled"
  cli_languages:
    - python

  # API Module
  api_module: "disabled"
  api_languages:
    - python
  api_features: []

  # Go Module Configuration
  go_framework: "gin"
  go_version: "1.24"

  graphql_api_module: "disabled"
  websocket_module: "disabled"

  # MCP Module
  mcp_module: "disabled"
  mcp_languages:
    - python
  mcp_transport: "stdio"
  mcp_example_tools: true

  # Docs Module
  docs_module: "disabled"
  docs_framework: "fumadocs"

  # Desktop Module
  desktop_module: "disabled"
  desktop_framework: "electron-vite"
  desktop_features: "auto_updater"
  desktop_platforms: "mac,windows,linux"

  # Shared Modules
  shared_logic: "disabled"
  codegen_module: "disabled"
  changelog_module: "disabled"
  # Fumadocs configuration defaults
  fumadocs_search_provider: "orama"
  fumadocs_llms_txt: "enabled"
  fumadocs_ai_search: "disabled"
  fumadocs_openapi: "enabled"
  fumadocs_typedoc: "disabled"
  fumadocs_theme: "default"
  fumadocs_sidebar: "default"
  fumadocs_i18n: "disabled"
  fumadocs_blog: "disabled"
  fumadocs_code_theme: "github"
  fumadocs_twoslash: "disabled"
  fumadocs_image_zoom: "enabled"
  fumadocs_banner: "disabled"
  fumadocs_last_updated: "enabled"
  fumadocs_edit_on_github: "enabled"
  fumadocs_feedback: "disabled"
  fumadocs_toc_depth: "3"
  fumadocs_mermaid: "disabled"
  fumadocs_math: "disabled"
  # Docusaurus configuration defaults
  docusaurus_search_provider: "local"
  docusaurus_analytics: "none"
  docusaurus_theme: "classic"
  docusaurus_llms_txt: "enabled"
  docusaurus_i18n: "disabled"
  docusaurus_versioning: "disabled"
  docusaurus_blog: "enabled"
  docusaurus_faster: "enabled"
  docusaurus_openapi: "enabled"
  # Docusaurus content enhancements
  docusaurus_mermaid: "enabled"
  docusaurus_math: "disabled"
  docusaurus_live_codeblock: "disabled"
  docusaurus_show_last_update: "enabled"
  # Docusaurus media
  docusaurus_ideal_images: "enabled"
  docusaurus_image_zoom: "disabled"
  # Docusaurus PWA & community
  docusaurus_pwa: "disabled"
  docusaurus_comments: "none"
  docusaurus_feedback: "disabled"
  # Docusaurus SEO & UI
  docusaurus_sitemap: "enabled"
  docusaurus_structured_data: "enabled"
  docusaurus_redirects: "disabled"
  docusaurus_announcement_bar: "disabled"
  docusaurus_back_to_top: "enabled"
  docusaurus_edit_url: "enabled"
  docusaurus_code_tabs: "disabled"
  docusaurus_changelog: "disabled"
  docusaurus_debug: "disabled"
  docusaurus_reading_time: "enabled"
  # Docusaurus remark/rehype plugins
  docusaurus_gfm: "enabled"
  docusaurus_emoji: "disabled"
  docusaurus_github_links: "disabled"
  docusaurus_autolink_headings: "enabled"
  # CI/CD defaults
  ci_platform: "github-actions"

  # ========================================
  # SaaS Modular Architecture Defaults
  # Split into: infra, auth, billing, app layers
  # ========================================

  # SaaS Infrastructure Layer
  saas_infra_module: "disabled"
  saas_runtime: "nextjs-16"
  saas_hosting: "vercel"
  saas_database: "neon"
  saas_orm: "prisma"

  # SaaS Auth Layer (requires infra)
  saas_auth_module: "disabled"
  saas_auth_provider: "clerk"
  saas_enterprise_bridge: "none"

  # SaaS Billing Layer (requires auth)
  saas_billing_module: "disabled"
  saas_billing_provider: "stripe"

  # SaaS App Layer (requires all above)
  saas_app_module: "disabled"

  # SaaS service providers
  saas_jobs: "triggerdev"
  saas_email: "resend"
  saas_analytics: "posthog"
  saas_ai: "openai"
  saas_storage: "r2"
  saas_cicd: "github-actions"

  # AI Tools configuration
  ai_tools_module: "enabled"
  ai_tools_mcp_thinking: true
  ai_tools_mcp_web: true
  ai_tools_mcp_documents: true
  ai_tools_mcp_utilities: true
  ai_tools_mcp_search: false
  saas_observability_sentry: true
  saas_observability_datadog: true
  saas_observability_otel: true
  saas_observability_structured_logging: true
  saas_include_fixtures: true
  saas_include_factories: true
  saas_test_suite_level: "standard"
  include_admin: false
  saas_search_provider: "none"
  saas_multi_tenancy_level: "teams"
  saas_compliance_level: "basic"
  saas_ai_features: "none"
  vector_db_provider: "none"
  embedding_provider: "openai"

# ========================================
# Project Basics
# ========================================
project_name:
  type: str
  help: "Human friendly project name"
  default: riso-example

project_layout:
  type: str
  help: "Choose the repository layout"
  default: single-package
  choices:
    - single-package
    - monorepo

quality_profile:
  type: str
  help: "Select baseline quality suite profile"
  default: standard
  choices:
    - standard
    - strict

python_versions:
  type: json
  help: "Python versions to test in CI matrix"
  default: '["3.11", "3.12", "3.13"]'
  when: "{{ ci_platform == 'github-actions' }}"

# ========================================
# CLI Module (Component-First)
# ========================================
cli_module:
  type: str
  help: "Enable CLI application scaffolding?"
  default: disabled
  choices:
    - disabled
    - enabled

cli_languages:
  type: str
  multiselect: true
  help: |
    Select CLI implementation language(s) - multiselect supported for monorepo:
    - python: Typer with Rich console output
    - rust: Clap with colored output
    - typescript: Commander.js with Chalk
    - go: Cobra v1.10 with slog logging
  choices:
    - python
    - rust
    - typescript
    - go
  default:
    - python
  when: "{{ cli_module == 'enabled' }}"

# ========================================
# API Module (Component-First)
# ========================================
api_module:
  type: str
  help: "Enable REST/HTTP API scaffolding?"
  default: disabled
  choices:
    - disabled
    - enabled

api_languages:
  type: str
  multiselect: true
  help: |
    Select API implementation language(s) - multiselect supported for monorepo:
    - python: FastAPI with Pydantic v2
    - node: Fastify with TypeScript
    - rust: Actix-web with Serde
    - go: Go with selectable framework (Gin, Fiber, Echo, Chi)
  choices:
    - python
    - node
    - rust
    - go
  default:
    - python
  when: "{{ api_module == 'enabled' }}"


go_framework:
  type: str
  help: |
    Select Go HTTP framework:
    - gin: Gin v1.11 - Most popular, great performance, rich middleware
    - fiber: Fiber v2.52 - Express-inspired, fastest, low memory
    - echo: Echo v4.13 - Minimalist, great docs, built-in middleware
    - chi: Chi v5.2 - Lightweight, stdlib-compatible, idiomatic
  choices:
    - gin
    - fiber
    - echo
    - chi
  default: gin
  when: "{{ api_module == 'enabled' and 'go' in api_languages }}"

go_version:
  type: str
  help: |
    Select Go version (1.24 stable, 1.26 releasing Feb 2026)
  choices:
    - "1.24"
    - "1.23"
  default: "1.24"
  when: "{{ 'go' in cli_languages or 'go' in api_languages }}"

api_features:
  type: str
  help: |
    Select additional API features (comma-separated):
    - graphql: GraphQL endpoint (Strawberry/Apollo/async-graphql)
    - websocket: WebSocket real-time communication
    - openapi: OpenAPI documentation generation
  choices:
    - none
    - graphql
    - websocket
    - graphql,websocket
  default: none
  when: "{{ api_module == 'enabled' }}"


# ========================================
# MCP Module (Component-First)
# ========================================
mcp_module:
  type: str
  help: "Enable MCP (Model Context Protocol) server scaffolding?"
  default: disabled
  choices:
    - disabled
    - enabled

mcp_languages:
  type: str
  multiselect: true
  help: |
    Select MCP server implementation language(s) - multiselect supported for monorepo:
    - python: FastMCP v2 with Pydantic
    - typescript: FastMCP (Node.js) with Zod
    - rust: Rust SDK (rmcp)
    - go: Official MCP Go SDK with slog logging
  choices:
    - python
    - typescript
    - rust
    - go
  default:
    - python
  when: "{{ mcp_module == 'enabled' }}"

mcp_transport:
  type: str
  help: |
    Select default transport protocol:
    - stdio: Standard I/O (default, best for local agents)
    - sse: Server-Sent Events (for web clients)
    - http: HTTP streaming
  choices:
    - stdio
    - sse
    - http
  default: stdio
  when: "{{ mcp_module == 'enabled' }}"

mcp_example_tools:
  type: bool
  help: "Include example tools (echo, timestamp, fetch)?"
  default: true
  when: "{{ mcp_module == 'enabled' }}"

# ========================================
# Desktop Module (Component-First)
# ========================================
desktop_module:
  type: str
  help: "Enable native desktop application scaffolding?"
  default: disabled
  choices:
    - disabled
    - enabled

desktop_framework:
  type: str
  help: |
    Select desktop framework:
    - electron-vite: Electron 34.x with electron-vite for optimal dev experience
    - electron-forge: Electron Forge for alternative build setup
    - tauri: Rust-based lightweight alternative to Electron
  choices:
    - electron-vite
    - electron-forge
    - tauri
  default: electron-vite
  when: "{{ desktop_module == 'enabled' }}"

desktop_features:
  type: str
  help: |
    Select desktop features (comma-separated):
    - auto_updater: Auto-update via GitHub Releases
    - tray_icon: System tray icon support
    - custom_titlebar: Frameless window with custom title bar
  choices:
    - none
    - auto_updater
    - tray_icon
    - custom_titlebar
    - auto_updater,tray_icon
    - auto_updater,custom_titlebar
    - tray_icon,custom_titlebar
    - auto_updater,tray_icon,custom_titlebar
  default: auto_updater
  when: "{{ desktop_module == 'enabled' }}"

desktop_platforms:
  type: str
  help: |
    Select target platforms (comma-separated):
    - mac: macOS (x64 and ARM64)
    - windows: Windows (x64 and ARM64)
    - linux: Linux (AppImage, deb, rpm)
  choices:
    - mac
    - windows
    - linux
    - mac,windows
    - mac,linux
    - windows,linux
    - mac,windows,linux
  default: mac,windows,linux
  when: "{{ desktop_module == 'enabled' }}"

# ========================================
# Docs Module (Component-First)
# ========================================
docs_module:
  type: str
  help: "Enable documentation site scaffolding?"
  default: disabled
  choices:
    - disabled
    - enabled

docs_framework:
  type: str
  help: |
    Select documentation framework:
    - fumadocs: Next.js-based, modern UI, MDX
    - sphinx-shibuya: Python Sphinx with Shibuya theme
    - docusaurus: React-based, versioning, blog
    - mkdocs: Python-based, Material theme
  choices:
    - fumadocs
    - sphinx-shibuya
    - docusaurus
    - mkdocs
  default: fumadocs
  when: "{{ docs_module == 'enabled' }}"

# ========================================
# Shared Modules
# ========================================
shared_logic:
  type: str
  help: "Generate shared logic package for cross-module code?"
  default: disabled
  choices:
    - disabled
    - enabled

codegen_module:
  type: str
  help: "Enable code generation and scaffolding tools?"
  default: disabled
  choices:
    - disabled
    - enabled

changelog_module:
  type: str
  help: "Enable changelog generation and release management?"
  default: disabled
  choices:
    - disabled
    - enabled

# ========================================
# Fumadocs Configuration Options
# ========================================
fumadocs_search_provider:
  type: str
  help: |
    Select search provider for Fumadocs:
    - orama: Built-in free search (default, self-hosted)
    - algolia: Hosted DocSearch, enterprise-grade
    - orama-cloud: Orama Cloud SDK for scaling
    - none: No search integration
  default: orama
  choices:
    - orama
    - algolia
    - orama-cloud
    - none
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_llms_txt:
  type: str
  help: |
    Enable llms.txt AI integration?
    Generates AI-friendly documentation endpoints:
    - /llms.txt (summary)
    - /llms-full.txt (complete docs)
    - /*.mdx (per-page markdown)
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_ai_search:
  type: str
  help: |
    Enable AI-powered search dialog?
    Scaffolds chat interface with Vercel AI SDK.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' and fumadocs_llms_txt == 'enabled' }}"

fumadocs_openapi:
  type: str
  help: |
    Enable OpenAPI documentation integration?
    Auto-generates interactive API reference from specs.
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' and api_module == 'enabled' }}"

fumadocs_typedoc:
  type: str
  help: |
    Enable TypeDoc SDK documentation?
    Generates TypeScript API docs from source.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' and api_module == 'enabled' and 'node' in api_languages }}"

fumadocs_theme:
  type: str
  help: |
    Select theming approach:
    - default: Fumadocs UI with neutral preset
    - ocean: Blue-toned ocean preset
    - purple: Purple accent preset
    - custom: Custom CSS variables (scaffold only)
  default: default
  choices:
    - default
    - ocean
    - purple
    - custom
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_sidebar:
  type: str
  help: |
    Select sidebar style:
    - default: Built-in Fumadocs sidebar
    - shadcn: Shadcn UI sidebar component
  default: default
  choices:
    - default
    - shadcn
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_i18n:
  type: str
  help: |
    Enable internationalization support?
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_blog:
  type: str
  help: |
    Enable blog/changelog section?
    Uses MDX content collection for posts.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_code_theme:
  type: str
  help: |
    Select syntax highlighting theme for code blocks:
    - github: GitHub light/dark (default)
    - catppuccin: Catppuccin latte/mocha
    - dracula: Dracula theme
    - nord: Nord theme
    - one: One light/dark
  default: github
  choices:
    - github
    - catppuccin
    - dracula
    - nord
    - one
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_twoslash:
  type: str
  help: |
    Enable Twoslash for TypeScript code blocks?
    Shows inline type hints, errors, and completions.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' and api_module == 'enabled' and 'node' in api_languages }}"

fumadocs_image_zoom:
  type: str
  help: |
    Enable medium-style image zoom on click?
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_banner:
  type: str
  help: |
    Enable announcement banner at top of docs?
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_last_updated:
  type: str
  help: |
    Show "Last updated" timestamp from git history?
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_edit_on_github:
  type: str
  help: |
    Show "Edit on GitHub" links on documentation pages?
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_feedback:
  type: str
  help: |
    Enable "Was this helpful?" feedback widget on pages?
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_toc_depth:
  type: str
  help: |
    Table of contents heading depth (2-6):
    - 2: H2 headings only
    - 3: H2-H3 headings (default)
    - 4: H2-H4 headings
  default: "3"
  choices:
    - "2"
    - "3"
    - "4"
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_mermaid:
  type: str
  help: |
    Enable Mermaid diagrams in Markdown?
    Supports flowcharts, sequence diagrams, ERDs, etc.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

fumadocs_math:
  type: str
  help: |
    Enable KaTeX math equations in Markdown?
    Supports inline ($) and block ($$) LaTeX.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'fumadocs' }}"

# ========================================
# Docusaurus Configuration Options
# ========================================
docusaurus_search_provider:
  type: str
  help: |
    Select search provider for Docusaurus:
    - local: Offline full-text search (docusaurus-search-local)
    - algolia: Hosted DocSearch, best UX, requires API key
    - typesense: Self-hosted, privacy-focused search
    - none: No search integration
  default: local
  choices:
    - local
    - algolia
    - typesense
    - none
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_analytics:
  type: str
  help: |
    Select analytics for Docusaurus:
    - none: No analytics
    - posthog: Product analytics + session replay
    - google: Google Analytics 4
    - matomo: Privacy-focused, self-hosted option
  default: none
  choices:
    - none
    - posthog
    - google
    - matomo
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_theme:
  type: str
  help: |
    Select theming approach:
    - classic: Default Infima CSS framework
    - tailwind: Tailwind CSS v4 + utility-first styling
  default: classic
  choices:
    - classic
    - tailwind
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_llms_txt:
  type: str
  help: |
    Enable llms.txt plugin for AI-ready documentation?
    Generates concatenated docs for LLM consumption and RAG pipelines.
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_i18n:
  type: str
  help: |
    Enable internationalization (i18n) support?
    Scaffolds locale config and translation workflow.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_versioning:
  type: str
  help: |
    Enable documentation versioning?
    Allows maintaining multiple doc versions (v1, v2, etc.)
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_blog:
  type: str
  help: |
    Enable blog functionality?
    Scaffolds blog directory with example posts and RSS/Atom feeds.
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_faster:
  type: str
  help: |
    Enable Docusaurus Faster optimizations?
    Uses Rspack bundler, SWC, and LightningCSS for 2-4x faster builds.
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_openapi:
  type: str
  help: |
    Enable OpenAPI documentation integration?
    Auto-generates API reference from OpenAPI specs.
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' and api_module == 'enabled' }}"

# ----------------------------------------
# Docusaurus Content Enhancements
# ----------------------------------------
docusaurus_mermaid:
  type: str
  help: |
    Enable Mermaid diagram support?
    Render flowcharts, sequence diagrams, ERDs, Gantt charts directly in markdown.
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_math:
  type: str
  help: |
    Enable KaTeX math equation support?
    Render LaTeX math with $...$ (inline) and $$...$$ (block) syntax.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

docusaurus_live_codeblock:
  type: str
  help: |
    Enable live code playground?
    Interactive React code blocks that users can edit and run in the browser.
  default: disabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

# ----------------------------------------
# Docusaurus Git & Metadata
# ----------------------------------------
docusaurus_show_last_update:
  type: str
  help: |
    Show last updated time on docs?
    Displays git-based "Last updated" timestamp and author on each page.
  default: enabled
  choices:
    - enabled
    - disabled
  when: "{{ docs_module == 'enabled' and docs_framework == 'docusaurus' }}"

# ----------------------------------------
# Docusaurus Media & Assets
# ----------------------------------------
docusaurus_ideal_images:
  type: str
  help: |
    Enable ideal-image plugin?
    Responsive images with lazy loading and low-quality placeholders.
  default: enabled
