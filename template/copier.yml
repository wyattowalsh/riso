_min_copier_version: "9.1.0"
_template: "."
_faq: true
_answers_file: ".copier-answers.yml"

metadata:
  name: "riso-template"
  version: "0.1.0"
  description: >
    Riso is a modular Copier template that defaults to a lightweight Python 3.11
    stack (uv, pytest, jupyter, ruff, ty, pylint) and offers opt-in Typer CLI,
    FastAPI/Fastify services, fastmcp integrations, shared logic, and documentation
    variants powered by Fumadocs (Next.js), Sphinx Shibuya, and Docusaurus.
  maintainers:
    - "Riso Template Working Group"
  tags:
    - python
    - typer
    - fastapi
    - fastify
    - uv
    - pnpm
    - fumadocs
    - sphinx-shibuya
    - docusaurus

defaults:
  project_name: "riso-example"
  project_slug: "{{ project_name | replace(' ', '-') | lower }}"
  package_name: "{{ project_slug | replace('-', '_') }}"
  project_layout: "single-package"
  quality_profile: "standard"
  python_versions: ["3.11", "3.12", "3.13"]
  cli_module: "disabled"
  api_tracks: "none"
  graphql_api_module: "disabled"
  mcp_module: "disabled"
  mcp_language: "python"
  mcp_transport: "stdio"
  mcp_example_tools: true
  websocket_module: "disabled"
  codegen_module: "disabled"
  changelog_module: "disabled"
  docs_site: "fumadocs"
  # Fumadocs configuration defaults
  fumadocs_search_provider: "orama"
  fumadocs_llms_txt: "enabled"
  fumadocs_ai_search: "disabled"
  fumadocs_openapi: "enabled"
  fumadocs_typedoc: "disabled"
  fumadocs_theme: "default"
  fumadocs_sidebar: "default"
  fumadocs_i18n: "disabled"
  fumadocs_blog: "disabled"
  fumadocs_code_theme: "github"
  fumadocs_twoslash: "disabled"
  fumadocs_image_zoom: "enabled"
  fumadocs_banner: "disabled"
  fumadocs_last_updated: "enabled"
  fumadocs_edit_on_github: "enabled"
  fumadocs_feedback: "disabled"
  fumadocs_toc_depth: "3"
  fumadocs_mermaid: "disabled"
  fumadocs_math: "disabled"
  # Docusaurus configuration defaults
  docusaurus_search_provider: "local"
  docusaurus_analytics: "none"
  docusaurus_theme: "classic"
  docusaurus_llms_txt: "enabled"
  docusaurus_i18n: "disabled"
  docusaurus_versioning: "disabled"
  docusaurus_blog: "enabled"
  docusaurus_faster: "enabled"
  docusaurus_openapi: "enabled"
  # Docusaurus content enhancements
  docusaurus_mermaid: "enabled"
  docusaurus_math: "disabled"
  docusaurus_live_codeblock: "disabled"
  docusaurus_show_last_update: "enabled"
  # Docusaurus media
  docusaurus_ideal_images: "enabled"
  docusaurus_image_zoom: "disabled"
  # Docusaurus PWA & community
  docusaurus_pwa: "disabled"
  docusaurus_comments: "none"
  docusaurus_feedback: "disabled"
  # Docusaurus SEO & UI
  docusaurus_sitemap: "enabled"
  docusaurus_structured_data: "enabled"
  docusaurus_redirects: "disabled"
  docusaurus_announcement_bar: "disabled"
  docusaurus_back_to_top: "enabled"
  docusaurus_edit_url: "enabled"
  docusaurus_code_tabs: "disabled"
  docusaurus_changelog: "disabled"
  docusaurus_debug: "disabled"
  docusaurus_reading_time: "enabled"
  # Docusaurus remark/rehype plugins
  docusaurus_gfm: "enabled"
  docusaurus_emoji: "disabled"
  docusaurus_github_links: "disabled"
  docusaurus_autolink_headings: "enabled"
  # Other defaults
  shared_logic: "disabled"
  ci_platform: "github-actions"
  saas_starter_module: "disabled"
  saas_runtime: "nextjs-16"
  saas_hosting: "vercel"
  saas_database: "neon"
  saas_orm: "prisma"
  saas_auth: "clerk"
  saas_enterprise_bridge: "none"
  saas_billing: "stripe"
  saas_jobs: "triggerdev"
  saas_email: "resend"
  saas_analytics: "posthog"
  saas_ai: "openai"
  saas_storage: "r2"
  saas_cicd: "github-actions"
  # AI Tools configuration
  ai_tools_module: "enabled"
  ai_tools_mcp_thinking: true
  ai_tools_mcp_web: true
  ai_tools_mcp_documents: true
  ai_tools_mcp_utilities: true
  ai_tools_mcp_search: false
  saas_observability_sentry: true
  saas_observability_datadog: true
  saas_observability_otel: true
  saas_observability_structured_logging: true
  saas_include_fixtures: true
  saas_include_factories: true
  saas_test_suite_level: "standard"

prompts:
  project_name:
    type: str
    help: "Human friendly project name"
  project_layout:
    type: str
    help: "Choose the repository layout"
    choices:
      - single-package
      - monorepo
  project_language:
    type: str
    help: "Select the primary project language"
    default: python
    choices:
      - python
      - rust
      - typescript

  quality_profile:
    type: str
    help: "Select baseline quality suite profile"
    choices:
      - standard
      - strict
  cli_module:
    type: str
    help: "Enable the Typer CLI scaffolding?"
    choices:
      - disabled
      - enabled
    when: "{{ project_language == 'python' }}"
  api_tracks:
    type: str
    help: "Select API tracks to scaffold"
    choices:
      - none
      - python
      - node
      - python+node
    when: "{{ project_language == 'python' }}"
  graphql_api_module:
    type: str
    help: "Enable GraphQL API scaffolding (Strawberry)?"
    choices:
      - disabled
      - enabled
    when: "{{ api_tracks in ['python', 'python+node'] }}"
  mcp_module:
    type: str
    help: "Enable fastmcp tooling module?"
    choices:
      - disabled
      - enabled

  mcp_language:
    type: str
    help: |
      Select MCP server implementation language:
      - python: FastMCP v2 with Pydantic
      - typescript: FastMCP (Node.js) with Zod
      - rust: Rust SDK (rmcp)
    choices:
      - python
      - typescript
      - rust
    default: python
    when: "{{ mcp_module == 'enabled' }}"

  mcp_transport:
    type: str
    help: |
      Select default transport protocol:
      - stdio: Standard I/O (default, best for local agents)
      - sse: Server-Sent Events (for web clients)
      - http: HTTP streaming
    choices:
      - stdio
      - sse
      - http
    default: stdio
    when: "{{ mcp_module == 'enabled' }}"

  mcp_example_tools:
    type: bool
    help: "Include example tools (echo, timestamp, fetch)?"
    default: true
    when: "{{ mcp_module == 'enabled' }}"

  websocket_module:
    type: str
    help: "Enable WebSocket real-time communication module?"
    choices:
      - disabled
      - enabled
    when: "{{ api_tracks in ['python', 'python+node'] }}"
  codegen_module:
    type: str
    help: "Enable code generation and scaffolding tools?"
    when: "{{ project_language == 'python' }}"
  changelog_module:
    type: str
    help: "Enable changelog generation and release management?"
    choices:
      - disabled
      - enabled
    when: "{{ project_language == 'python' }}"
  docs_site:
    type: str
    help: "Pick documentation variant"
    choices:
      - fumadocs
      - sphinx-shibuya
      - docusaurus
      - none
    when: "{{ project_language == 'python' }}"
  
  # ========================================
  # Fumadocs Configuration Options
  # ========================================
  fumadocs_search_provider:
    type: str
    help: |
      Select search provider for Fumadocs:
      - orama: Built-in free search (default, self-hosted)
      - algolia: Hosted DocSearch, enterprise-grade
      - orama-cloud: Orama Cloud SDK for scaling
      - none: No search integration
    default: orama
    choices:
      - orama
      - algolia
      - orama-cloud
      - none
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_llms_txt:
    type: str
    help: |
      Enable llms.txt AI integration?
      Generates AI-friendly documentation endpoints:
      - /llms.txt (summary)
      - /llms-full.txt (complete docs)
      - /*.mdx (per-page markdown)
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_ai_search:
    type: str
    help: |
      Enable AI-powered search dialog?
      Scaffolds chat interface with Vercel AI SDK.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' and fumadocs_llms_txt == 'enabled' }}"

  fumadocs_openapi:
    type: str
    help: |
      Enable OpenAPI documentation integration?
      Auto-generates interactive API reference from specs.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' and api_tracks in ['python', 'node', 'python+node'] }}"

  fumadocs_typedoc:
    type: str
    help: |
      Enable TypeDoc SDK documentation?
      Generates TypeScript API docs from source.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' and api_tracks in ['node', 'python+node'] }}"

  fumadocs_theme:
    type: str
    help: |
      Select theming approach:
      - default: Fumadocs UI with neutral preset
      - ocean: Blue-toned ocean preset
      - purple: Purple accent preset
      - custom: Custom CSS variables (scaffold only)
    default: default
    choices:
      - default
      - ocean
      - purple
      - custom
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_sidebar:
    type: str
    help: |
      Select sidebar style:
      - default: Built-in Fumadocs sidebar
      - shadcn: Shadcn UI sidebar component
    default: default
    choices:
      - default
      - shadcn
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_i18n:
    type: str
    help: |
      Enable internationalization support?
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_blog:
    type: str
    help: |
      Enable blog/changelog section?
      Uses MDX content collection for posts.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_code_theme:
    type: str
    help: |
      Select syntax highlighting theme for code blocks:
      - github: GitHub light/dark (default)
      - catppuccin: Catppuccin latte/mocha
      - dracula: Dracula theme
      - nord: Nord theme
      - one: One light/dark
    default: github
    choices:
      - github
      - catppuccin
      - dracula
      - nord
      - one
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_twoslash:
    type: str
    help: |
      Enable Twoslash for TypeScript code blocks?
      Shows inline type hints, errors, and completions.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' and api_tracks in ['node', 'python+node'] }}"

  fumadocs_image_zoom:
    type: str
    help: |
      Enable medium-style image zoom on click?
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_banner:
    type: str
    help: |
      Enable announcement banner at top of docs?
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_last_updated:
    type: str
    help: |
      Show "Last updated" timestamp from git history?
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_edit_on_github:
    type: str
    help: |
      Show "Edit on GitHub" links on documentation pages?
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_feedback:
    type: str
    help: |
      Enable "Was this helpful?" feedback widget on pages?
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_toc_depth:
    type: str
    help: |
      Table of contents heading depth (2-6):
      - 2: H2 headings only
      - 3: H2-H3 headings (default)
      - 4: H2-H4 headings
    default: "3"
    choices:
      - "2"
      - "3"
      - "4"
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_mermaid:
    type: str
    help: |
      Enable Mermaid diagrams in Markdown?
      Supports flowcharts, sequence diagrams, ERDs, etc.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  fumadocs_math:
    type: str
    help: |
      Enable KaTeX math equations in Markdown?
      Supports inline ($) and block ($$) LaTeX.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'fumadocs' }}"

  # ========================================
  # Docusaurus Configuration Options
  # ========================================
  docusaurus_search_provider:
    type: str
    help: |
      Select search provider for Docusaurus:
      - local: Offline full-text search (docusaurus-search-local)
      - algolia: Hosted DocSearch, best UX, requires API key
      - typesense: Self-hosted, privacy-focused search
      - none: No search integration
    default: local
    choices:
      - local
      - algolia
      - typesense
      - none
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_analytics:
    type: str
    help: |
      Select analytics for Docusaurus:
      - none: No analytics
      - posthog: Product analytics + session replay
      - google: Google Analytics 4
      - matomo: Privacy-focused, self-hosted option
    default: none
    choices:
      - none
      - posthog
      - google
      - matomo
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_theme:
    type: str
    help: |
      Select theming approach:
      - classic: Default Infima CSS framework
      - tailwind: Tailwind CSS v4 + utility-first styling
    default: classic
    choices:
      - classic
      - tailwind
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_llms_txt:
    type: str
    help: |
      Enable llms.txt plugin for AI-ready documentation?
      Generates concatenated docs for LLM consumption and RAG pipelines.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_i18n:
    type: str
    help: |
      Enable internationalization (i18n) support?
      Scaffolds locale config and translation workflow.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_versioning:
    type: str
    help: |
      Enable documentation versioning?
      Allows maintaining multiple doc versions (v1, v2, etc.)
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_blog:
    type: str
    help: |
      Enable blog functionality?
      Scaffolds blog directory with example posts and RSS/Atom feeds.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_faster:
    type: str
    help: |
      Enable Docusaurus Faster optimizations?
      Uses Rspack bundler, SWC, and LightningCSS for 2-4x faster builds.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_openapi:
    type: str
    help: |
      Enable OpenAPI documentation integration?
      Auto-generates API reference from OpenAPI specs.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' and api_tracks in ['python', 'node', 'python+node'] }}"

  # ----------------------------------------
  # Docusaurus Content Enhancements
  # ----------------------------------------
  docusaurus_mermaid:
    type: str
    help: |
      Enable Mermaid diagram support?
      Render flowcharts, sequence diagrams, ERDs, Gantt charts directly in markdown.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_math:
    type: str
    help: |
      Enable KaTeX math equation support?
      Render LaTeX math with $...$ (inline) and $$...$$ (block) syntax.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_live_codeblock:
    type: str
    help: |
      Enable live code playground?
      Interactive React code blocks that users can edit and run in the browser.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus Git & Metadata
  # ----------------------------------------
  docusaurus_show_last_update:
    type: str
    help: |
      Show last updated time on docs?
      Displays git-based "Last updated" timestamp and author on each page.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus Media & Assets
  # ----------------------------------------
  docusaurus_ideal_images:
    type: str
    help: |
      Enable ideal-image plugin?
      Responsive images with lazy loading and low-quality placeholders.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_image_zoom:
    type: str
    help: |
      Enable image zoom plugin?
      Medium-style click-to-zoom for documentation images.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus PWA & Offline
  # ----------------------------------------
  docusaurus_pwa:
    type: str
    help: |
      Enable Progressive Web App (PWA) support?
      Offline capability, app installation, and service worker caching.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus Community & Engagement
  # ----------------------------------------
  docusaurus_comments:
    type: str
    help: |
      Enable comments on documentation pages?
      - giscus: GitHub Discussions-powered comments (recommended)
      - none: No comments
    default: none
    choices:
      - giscus
      - none
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_feedback:
    type: str
    help: |
      Enable "Was this page helpful?" feedback widget?
      Collects reader feedback on documentation quality.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus SEO & Discovery
  # ----------------------------------------
  docusaurus_sitemap:
    type: str
    help: |
      Enable sitemap.xml generation?
      Improves search engine discoverability and crawling.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_structured_data:
    type: str
    help: |
      Enable JSON-LD structured data for SEO?
      Adds schema.org Organization, WebSite, and Article markup for rich results.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_redirects:
    type: str
    help: |
      Enable client-side redirects plugin?
      Handle URL changes and old page preservation gracefully.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus UI Enhancements
  # ----------------------------------------
  docusaurus_announcement_bar:
    type: str
    help: |
      Enable announcement bar at top of site?
      Ideal for new releases, events, or important notices.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_back_to_top:
    type: str
    help: |
      Enable back-to-top button?
      Floating button for quick scroll to page top.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_edit_url:
    type: str
    help: |
      Enable "Edit this page" links?
      Links to source file on GitHub for community contributions.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_code_tabs:
    type: str
    help: |
      Enable tabbed code blocks plugin?
      Group code samples by language with synchronized tab selection.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_changelog:
    type: str
    help: |
      Enable changelog integration?
      Include CHANGELOG.md as documentation page.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_debug:
    type: str
    help: |
      Enable debug plugin in development?
      Adds /__docusaurus/debug route for inspecting site data.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_reading_time:
    type: str
    help: |
      Show estimated reading time on docs/blog?
      Displays "X min read" based on word count.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ----------------------------------------
  # Docusaurus Remark/Rehype Plugins
  # ----------------------------------------
  docusaurus_gfm:
    type: str
    help: |
      Enable GitHub Flavored Markdown (GFM)?
      Adds tables, strikethrough, task lists, and autolink literals.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_emoji:
    type: str
    help: |
      Enable emoji shortcode support?
      Converts :smile: to 😄 and other emoji shortcodes.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_github_links:
    type: str
    help: |
      Enable GitHub reference autolinking?
      Autolinks #issues, @mentions, and commit SHAs to GitHub.
    default: disabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  docusaurus_autolink_headings:
    type: str
    help: |
      Enable autolinked headings?
      Adds clickable anchor links to all headings.
    default: enabled
    choices:
      - enabled
      - disabled
    when: "{{ docs_site == 'docusaurus' }}"

  # ========================================
  # AI Tools Configuration
  # ========================================
  ai_tools_module:
    type: str
    help: |
      Enable AI coding tools configuration?
      Generates config files for Claude Code, Codex CLI, GitHub Copilot CLI,
      Cursor CLI, Gemini CLI, Amazon Q CLI, and OpenCode.
      All tools share AGENTS.md as the single source of truth.
    default: enabled
    choices:
      - enabled
      - disabled

  ai_tools_mcp_thinking:
    type: bool
    help: |
      Include thinking/reasoning MCP servers?
      (sequential-thinking, structured-thinking, cascade-thinking, etc.)
    default: true
    when: "{{ ai_tools_module == 'enabled' }}"

  ai_tools_mcp_web:
    type: bool
    help: |
      Include web MCP servers?
      (fetch, fetcher, playwright, deepwiki)
    default: true
    when: "{{ ai_tools_module == 'enabled' }}"

  ai_tools_mcp_documents:
    type: bool
    help: |
      Include document processing MCP servers?
      (docling for PDF/DOCX, repomix for repo context)
    default: true
    when: "{{ ai_tools_module == 'enabled' }}"

  ai_tools_mcp_utilities:
    type: bool
    help: |
      Include utility MCP servers?
      (memory persistence)
    default: true
    when: "{{ ai_tools_module == 'enabled' }}"

  ai_tools_mcp_search:
    type: bool
    help: |
      Include search MCP servers (requires API keys)?
      (brave-search, tavily, context7 - keys via env vars)
    default: false
    when: "{{ ai_tools_module == 'enabled' }}"

  shared_logic:
    type: str
    help: "Generate shared logic package?"
    choices:
      - disabled
      - enabled
  include_databases:
    type: str
    help: "Include PostgreSQL and Redis services in docker-compose?"
    choices:
      - "no"
      - "yes"
    when: "{{ api_tracks in ['python', 'node', 'python+node'] }}"
  ci_platform:
    type: str
    help: "Select CI/CD platform"
    choices:
      - github-actions
      - none
  
  # ========================================
  # SaaS Starter Module Prompts
  # ========================================
  saas_starter_module:
    type: str
    help: |
      Enable SaaS Starter module? Generates production-ready SaaS application with
      authentication, billing, database, background jobs, email, analytics, AI, storage,
      observability, and deployment configuration. Choose your technology stack across
      14 categories with binary choices (2 options per category).
    default: disabled
    choices:
      - enabled
      - disabled
  
  saas_runtime:
    type: str
    help: |
      Select runtime framework for your SaaS application:
      - Next.js 16: React 19.2, App Router, Turbopack, largest ecosystem, Vercel-first
      - Remix 2.x: Server-first routes, explicit data loading, good for complex forms
    default: nextjs-16
    choices:
      - nextjs-16
      - remix-2
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_hosting:
    type: str
    help: |
      Select hosting platform:
      - Vercel: Native Next.js support, edge functions, image optimization, preview deployments
      - Cloudflare: Global edge network, Pages + Workers, lower egress costs, R2 storage
    default: vercel
    choices:
      - vercel
      - cloudflare
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_database:
    type: str
    help: |
      Select database provider:
      - Neon: Serverless Postgres, database branching, autoscale-to-zero, CI/PR databases
      - Supabase: Postgres + Auth + Storage + Edge Functions, all-in-one BaaS platform
    default: neon
    choices:
      - neon
      - supabase
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_orm:
    type: str
    help: |
      Select ORM for database access:
      - Prisma: Best TypeScript ergonomics, schema DSL, Prisma Studio, migration workflow
      - Drizzle: Lightweight, SQL-like syntax, edge-optimized, schema-as-code in TypeScript
    default: prisma
    choices:
      - prisma
      - drizzle
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_auth:
    type: str
    help: |
      Select authentication provider:
      - Clerk: Hosted auth, built-in UI components, organizations, passkeys, fastest setup
      - Auth.js: Self-hosted, open-source, full control, OAuth providers, lower cost
    default: clerk
    choices:
      - clerk
      - authjs
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_enterprise_bridge:
    type: str
    help: |
      Add enterprise authentication bridge (SSO, SCIM, Directory Sync)?
      - WorkOS: Enterprise-ready SSO (Okta, Azure AD, Google Workspace), SCIM provisioning
      - None: Skip enterprise features for now (pure PLG)
    default: none
    choices:
      - workos
      - none
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_billing:
    type: str
    help: |
      Select billing provider:
      - Stripe: Full control, usage metering, widest ecosystem, manual tax handling
      - Paddle: Merchant of Record (MoR), automatic tax/VAT, simpler compliance, higher fees
      - LemonSqueezy: MoR alternative, good indie-hacker fit, simpler than Stripe
    default: stripe
    choices:
      - stripe
      - paddle
      - lemonsqueezy
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_jobs:
    type: str
    help: |
      Select background job system:
      - Trigger.dev: Task-centric, AI-optimized, kicked off from your app, built-in retries
      - Inngest: Event-driven workflows, durable execution, complex orchestration, scheduling
    default: triggerdev
    choices:
      - triggerdev
      - inngest
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_email:
    type: str
    help: |
      Select email provider:
      - Resend: React Email templates, Vercel integration, modern DX, component-based
      - Postmark: Industry-leading deliverability, mature service, template management UI
    default: resend
    choices:
      - resend
      - postmark
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_analytics:
    type: str
    help: |
      Select analytics platform:
      - PostHog: Product OS (analytics + feature flags + session replay), open-source option
      - Amplitude: Enterprise product analytics, sophisticated cohorts, data warehouse integrations
    default: posthog
    choices:
      - posthog
      - amplitude
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_ai:
    type: str
    help: |
      Select AI provider:
      - OpenAI: GPT-4o/GPT-5, largest ecosystem, best for chat interfaces, function calling
      - Anthropic: Claude 4.x, longer context windows (200k+), better for document analysis
    default: openai
    choices:
      - openai
      - anthropic
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_storage:
    type: str
    help: |
      Select file storage provider:
      - Cloudflare R2: S3-compatible, zero egress fees, global edge network
      - Supabase Storage: Integrated with Supabase platform, RLS policies, image transformations
    default: r2
    choices:
      - r2
      - supabase-storage
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_cicd:
    type: str
    help: |
      Select CI/CD platform:
      - GitHub Actions: Native GitHub integration, marketplace actions, deploy to Vercel
      - Cloudflare CI: Integrated with Cloudflare Pages/Workers, fast edge deployments
    default: github-actions
    choices:
      - github-actions
      - cloudflare-ci
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_observability_sentry:
    type: bool
    help: Enable Sentry for error tracking?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_observability_datadog:
    type: bool
    help: Enable Datadog for APM (Application Performance Monitoring)?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_observability_otel:
    type: bool
    help: Enable OpenTelemetry instrumentation for traces and metrics?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_observability_structured_logging:
    type: bool
    help: Enable structured JSON logging with correlation IDs?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_include_fixtures:
    type: bool
    help: |
      Include seeded database fixtures with example users, organizations, and subscriptions?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_include_factories:
    type: bool
    help: |
      Include test data factories (Faker.js integration) for generating realistic test data?
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"
  
  saas_test_suite_level:
    type: str
    help: |
      Select test suite coverage level:
      - Standard: Unit tests + integration tests for all services
      - Comprehensive: Standard + E2E tests for critical user flows (signup, billing, dashboard)
    default: standard
    choices:
      - standard
      - comprehensive
    when: "{{ saas_starter_module == 'enabled' }}"

  # ============================================================================
  # Application-Level Scaffolding Options
  # These options generate actual business logic and UI components
  # ============================================================================

  saas_tenancy_model:
    type: str
    help: |
      Select tenancy model for your SaaS application:
      - B2B Teams: Organization-centric with team workspaces, seat-based billing, team invites,
        shared resources, and organization switching. Best for collaboration tools, project
        management, and enterprise software.
      - B2C Users: User-centric with individual accounts, personal subscriptions, no team
        features. Best for consumer apps, personal productivity tools, and individual SaaS.
    default: b2b-teams
    choices:
      - b2b-teams
      - b2c-users
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_rbac_system:
    type: str
    help: |
      Select role-based access control (RBAC) system:
      - Basic Roles: Fixed owner/admin/member roles with hardcoded permissions. Simple,
        predictable, covers 80% of use cases. No admin UI needed.
      - Custom Permissions: Dynamic permission system with role management UI, granular
        access control, and permission inheritance. Best for enterprise or complex access needs.
    default: basic-roles
    choices:
      - basic-roles
      - custom-permissions
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_onboarding:
    type: str
    help: |
      Include user onboarding flow scaffolding?
      - Wizard: Multi-step guided setup with progress indicator, data collection, and
        completion tracking. Great for complex products requiring initial configuration.
      - Checklist: Dashboard checklist with completion tracking and contextual prompts.
        Non-blocking, lets users explore while guiding them to key actions.
      - None: No onboarding scaffolding. Users land directly on the dashboard.
    default: wizard
    choices:
      - wizard
      - checklist
      - none
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_admin_dashboard:
    type: bool
    help: |
      Include admin dashboard scaffolding? Generates:
      - Admin-only routes with role-based authentication
      - User management (list, search, view details, suspend accounts)
      - Organization management (for B2B) or subscription overview (for B2C)
      - User impersonation for debugging customer issues
      - Basic metrics dashboard (signups, active users, revenue)
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_user_impersonation:
    type: bool
    help: |
      Enable user impersonation for admin users? Allows admins to:
      - View the app as any user for debugging and support
      - Audit trail of all impersonation sessions
      - Clear visual indicator when impersonating
      Requires saas_admin_dashboard to be enabled.
    default: true
    when: "{{ saas_starter_module == 'enabled' and saas_admin_dashboard }}"

  saas_notifications:
    type: str
    help: |
      Select notification system scaffolding:
      - Both: Real-time in-app notification center + email notifications with preferences.
        Includes notification bell component, WebSocket/SSE delivery, and email digests.
      - Email Only: Email notifications only. Simpler architecture, no real-time component.
      - None: No notification scaffolding. You'll implement notifications manually.
    default: both
    choices:
      - both
      - email-only
      - none
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_waitlist:
    type: bool
    help: |
      Include pre-launch waitlist scaffolding? Generates:
      - Waitlist landing page with email capture
      - Invite code system with limited-use codes
      - Referral tracking (who invited whom)
      - Admin panel for managing waitlist and sending invites
      Best for validating demand before full launch.
    default: false
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_i18n:
    type: bool
    help: |
      Include internationalization (i18n) scaffolding? Generates:
      - next-intl (Next.js) or remix-i18next (Remix) configuration
      - Default English locale with placeholder translations
      - Language switcher component in navigation
      - Date, number, and currency formatting utilities
      - Translation key extraction setup
    default: false
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_api_access:
    type: str
    help: |
      Select API access model for your SaaS:
      - Public API: Full API key management with user-facing UI, rate limiting dashboard,
        usage tracking, and auto-generated API documentation. Best for developer platforms.
      - Internal Only: API routes exist but for internal use only. No API key management UI.
        Users interact via web interface only.
    default: internal-only
    choices:
      - public-api
      - internal-only
    when: "{{ saas_starter_module == 'enabled' }}"

  # ============================================================================
  # UI & Frontend Options
  # ============================================================================

  saas_ui_framework:
    type: str
    help: |
      Select UI component framework:
      - shadcn-ui: Copy-paste components built on Radix, full customization, Tailwind-native.
        Best for: Custom designs, full control over styling.
      - Radix Primitives: Unstyled accessible primitives, bring your own styles.
        Best for: Design systems, maximum flexibility.
      - Headless UI: Tailwind Labs components, simpler API, good defaults.
        Best for: Quick prototypes, Tailwind-first teams.
    default: shadcn-ui
    choices:
      - shadcn-ui
      - radix-primitives
      - headless-ui
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_form_library:
    type: str
    help: |
      Select form handling library:
      - React Hook Form: Performance-focused, minimal re-renders, Zod integration.
      - Conform: Remix-native, progressive enhancement, server validation.
      - None: Manual form handling with native React.
    default: react-hook-form
    choices:
      - react-hook-form
      - conform
      - none
    when: "{{ saas_starter_module == 'enabled' }}"

  # ============================================================================
  # Real-time & Communication
  # ============================================================================

  saas_realtime:
    type: str
    help: |
      Select real-time communication provider:
      - Socket.io: Self-hosted, full control, works with any backend.
      - Pusher: Industry standard, channels/presence, easy setup, generous free tier.
      - Ably: Enterprise-grade, message history, global edge network.
      - Supabase Realtime: Integrated with Supabase, Postgres changes, presence.
      - None: No real-time features (polling or SSE only).
    default: none
    choices:
      - socketio
      - pusher
      - ably
      - supabase-realtime
      - none
    when: "{{ saas_starter_module == 'enabled' }}"

  # ============================================================================
  # Marketing & Growth
  # ============================================================================

  saas_landing_page:
    type: bool
    help: |
      Include marketing landing page scaffolding? Generates:
      - Hero section with CTA
      - Features grid
      - Pricing table (connected to billing plans)
      - Testimonials section
      - FAQ accordion
      - Footer with links
    default: true
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_blog:
    type: bool
    help: |
      Include MDX blog scaffolding? Generates:
      - Blog listing page
      - Individual post pages with MDX support
      - Author profiles
      - Categories/tags
      - RSS feed
      - SEO metadata
    default: false
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_changelog_public:
    type: bool
    help: |
      Include public changelog page? Generates:
      - Changelog listing from MDX files
      - Version badges (new, improved, fixed)
      - Subscribe to updates
      - RSS feed for changelog
    default: false
    when: "{{ saas_starter_module == 'enabled' }}"

  # ============================================================================
  # Security & Compliance
  # ============================================================================

  saas_2fa:
    type: bool
    help: |
      Include two-factor authentication (2FA) scaffolding? Generates:
      - TOTP setup flow (Google Authenticator, Authy compatible)
      - Backup codes generation and storage
      - 2FA enforcement settings per organization
      - Recovery flow
      Note: Clerk has built-in 2FA. This adds custom 2FA for Auth.js.
    default: false
    when: "{{ saas_starter_module == 'enabled' and saas_auth == 'authjs' }}"

  saas_gdpr_tools:
    type: bool
    help: |
      Include GDPR compliance tools? Generates:
      - Data export endpoint (download all user data as JSON/ZIP)
      - Account deletion flow with grace period
      - Cookie consent banner
      - Privacy preference center
      - Data processing records
    default: false
    when: "{{ saas_starter_module == 'enabled' }}"

  # ============================================================================
  # Developer Experience
  # ============================================================================

  saas_api_docs:
    type: bool
    help: |
      Include API documentation generation? Generates:
      - OpenAPI 3.1 schema from route handlers
      - Swagger UI at /api/docs
      - TypeScript client generation script
      - API versioning support
    default: false
    when: "{{ saas_starter_module == 'enabled' and saas_api_access == 'public-api' }}"

  saas_rate_limiting:
    type: str
    help: |
      Select rate limiting implementation:
      - Upstash: Redis-based, serverless, sliding window, great for edge.
      - Built-in: In-memory rate limiting (resets on deploy, single-instance only).
      - None: No rate limiting (handle at infrastructure level).
    default: upstash
    choices:
      - upstash
      - built-in
      - none
    when: "{{ saas_starter_module == 'enabled' }}"

  saas_file_upload:
    type: str
    help: |
      Select file upload widget:
      - UploadThing: Type-safe uploads, built for Next.js, S3-compatible backend.
      - React Dropzone: Flexible, bring your own backend, more control.
      - None: Manual file input handling.
    default: uploadthing
    choices:
      - uploadthing
      - react-dropzone
      - none
    when: "{{ saas_starter_module == 'enabled' }}"

exclude:
  - ".git"
  - ".github"
  - "README.md"
  - "specs/"
  - "config/"
  - "samples/"
  - "scripts/"
  - "{% if project_language != 'python' %}python/{% endif %}"
  - "{% if project_language != 'rust' %}rust/{% endif %}"
  - "{% if project_language != 'python' %}pyproject.toml{% endif %}"
  - "{% if project_language != 'rust' %}Cargo.toml{% endif %}"

tasks:
  post_init:
    - "scripts/hooks/post-init.sh {{ _copier_conf.answers_file }}"
