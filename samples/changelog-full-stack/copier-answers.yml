# Copier Answers: Changelog Full Stack
# Description: Full stack with changelog and all features
# Ideal for: Complex projects with release management

_commit: HEAD
_src_path: ../../template
project_name: "Changelog Full Stack"
project_slug: changelog-full-stack
package_name: changelog_full_stack
project_layout: monorepo
quality_profile: strict
python_versions:
  - "3.11"
  - "3.12"
  - "3.13"

# Component-First Configuration
cli_module: enabled
cli_languages:
  - python

api_module: enabled
api_languages:
  - python
api_features: graphql,websocket

mcp_module: enabled
mcp_languages:
  - python
mcp_transport: stdio
mcp_example_tools: true

docs_module: enabled
docs_framework: fumadocs

shared_logic: enabled
codegen_module: disabled
changelog_module: enabled
ci_platform: github-actions
ai_tools_module: enabled
