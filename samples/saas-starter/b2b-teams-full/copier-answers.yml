# Copier Answers: B2B Teams Full Stack
# Description: Full-featured B2B SaaS with teams, custom RBAC, admin dashboard, notifications
# Ideal for: Team collaboration tools, project management, enterprise SaaS

_commit: HEAD
_src_path: ../../template
project_name: "B2B Teams SaaS"
project_layout: single-package
quality_profile: standard
cli_module: disabled
api_tracks: none
graphql_api_module: disabled
mcp_module: disabled
docs_site: fumadocs
shared_logic: disabled
include_databases: "no"
ci_platform: github-actions

# SaaS Starter Configuration - Infrastructure
saas_starter_module: enabled
saas_runtime: nextjs-16
saas_hosting: vercel
saas_database: neon
saas_orm: prisma
saas_auth: clerk
saas_enterprise_bridge: workos
saas_billing: stripe
saas_jobs: triggerdev
saas_email: resend
saas_analytics: posthog
saas_ai: openai
saas_storage: r2
saas_cicd: github-actions
saas_observability_sentry: true
saas_observability_datadog: true
saas_observability_otel: true
saas_observability_structured_logging: true
saas_include_fixtures: true
saas_include_factories: true
saas_test_suite_level: comprehensive

# SaaS Starter Configuration - Application Scaffolding
saas_tenancy_model: b2b-teams
saas_rbac_system: custom-permissions
saas_onboarding: wizard
saas_admin_dashboard: true
saas_user_impersonation: true
saas_notifications: both
saas_waitlist: false
saas_i18n: false
saas_api_access: public-api
