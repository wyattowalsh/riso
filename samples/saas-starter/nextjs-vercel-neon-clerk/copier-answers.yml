# Copier Answers: Vercel Starter Stack
# Description: Best developer experience, fastest setup, Vercel ecosystem
# Ideal for: Startups, MVPs, Next.js-first teams

_commit: HEAD
_src_path: ../../../template
project_name: "SaaS App Vercel Starter"
project_layout: single-package
quality_profile: standard

# Component-First Configuration
cli_module: disabled
api_module: disabled
mcp_module: disabled
docs_module: enabled
docs_framework: fumadocs
shared_logic: disabled
codegen_module: disabled
changelog_module: disabled
ci_platform: github-actions
ai_tools_module: enabled

# SaaS Modular Architecture - All 4 Layers
saas_infra_module: enabled
saas_runtime: nextjs-16
saas_hosting: vercel
saas_database: neon
saas_orm: prisma

saas_auth_module: enabled
saas_auth_provider: clerk
saas_enterprise_bridge: none

saas_billing_module: enabled
saas_billing_provider: stripe

saas_app_module: enabled
saas_jobs: triggerdev
saas_email: resend
saas_analytics: posthog
saas_ai: openai
saas_storage: r2
saas_cicd: github-actions

# Observability
saas_observability_sentry: true
saas_observability_datadog: true
saas_observability_otel: true
saas_observability_structured_logging: true

# Testing
saas_include_fixtures: true
saas_include_factories: true
saas_test_suite_level: standard

# Application Scaffolding
saas_tenancy_model: b2b-teams
saas_rbac_system: basic-roles
saas_onboarding: wizard
saas_admin_dashboard: true
saas_user_impersonation: true
saas_notifications: both
saas_waitlist: false
saas_i18n: false
saas_api_access: internal-only

# UI & Features
saas_ui_framework: shadcn-ui
saas_form_library: react-hook-form
saas_realtime: none
saas_landing_page: true
saas_blog: false
saas_changelog_public: false
saas_2fa: false
saas_gdpr_tools: false
saas_api_docs: false
saas_rate_limiting: upstash
saas_file_upload: uploadthing
