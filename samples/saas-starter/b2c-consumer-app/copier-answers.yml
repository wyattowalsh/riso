# Copier Answers: B2C Consumer App
# Description: User-centric consumer SaaS with personal subscriptions, no team features
# Ideal for: Personal productivity tools, consumer apps, individual SaaS

_commit: HEAD
_src_path: ../../template
project_name: "Consumer SaaS App"
project_layout: single-package
quality_profile: standard
cli_module: disabled
api_tracks: none
graphql_api_module: disabled
mcp_module: disabled
docs_site: fumadocs
shared_logic: disabled
include_databases: "no"
ci_platform: github-actions

# SaaS Starter Configuration - Infrastructure
saas_starter_module: enabled
saas_runtime: nextjs-16
saas_hosting: vercel
saas_database: supabase
saas_orm: drizzle
saas_auth: clerk
saas_enterprise_bridge: none
saas_billing: paddle
saas_jobs: inngest
saas_email: resend
saas_analytics: posthog
saas_ai: anthropic
saas_storage: supabase-storage
saas_cicd: github-actions
saas_observability_sentry: true
saas_observability_datadog: false
saas_observability_otel: true
saas_observability_structured_logging: true
saas_include_fixtures: true
saas_include_factories: true
saas_test_suite_level: standard

# SaaS Starter Configuration - Application Scaffolding
saas_tenancy_model: b2c-users
saas_rbac_system: basic-roles
saas_onboarding: checklist
saas_admin_dashboard: true
saas_user_impersonation: true
saas_notifications: email-only
saas_waitlist: false
saas_i18n: false
saas_api_access: internal-only

# SaaS Starter Configuration - UI & Features
saas_ui_framework: shadcn-ui
saas_form_library: react-hook-form
saas_realtime: none
saas_landing_page: true
saas_blog: false
saas_changelog_public: false
saas_2fa: false
saas_gdpr_tools: true
saas_api_docs: false
saas_rate_limiting: upstash
saas_file_upload: uploadthing
