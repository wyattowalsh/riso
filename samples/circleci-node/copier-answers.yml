# Sample: Node.js API with CircleCI
# Demonstrates CircleCI configuration with Node.js, pnpm, and parallelism

_src_path: ../..
project_name: circleci-example
project_slug: circleci-example
package_name: circleci_example
project_layout: monorepo
quality_profile: standard

# Component Configuration
cli_module: disabled
api_module: enabled
api_languages:
  - node
api_features: none
mcp_module: disabled
docs_module: enabled
docs_framework: fumadocs
desktop_module: disabled

# Shared Modules
shared_logic: disabled
codegen_module: disabled
changelog_module: disabled

# CI/CD Platform - CircleCI
ci_platform: circleci

# AI Tools
ai_tools_module: enabled
ai_tools_mcp_thinking: false
ai_tools_mcp_web: true
ai_tools_mcp_documents: true
ai_tools_mcp_utilities: false
ai_tools_mcp_search: false

# SaaS
saas_infra_module: disabled
