# Copier Answers: Full Fumadocs Stack
# Description: Full-featured Fumadocs with Python CLI, API, and MCP
# Ideal for: Comprehensive documentation sites with tooling

_commit: HEAD
_src_path: ../../template
project_name: "Fumadocs Full Stack"
project_slug: fumadocs-full-stack
package_name: fumadocs_full_stack
project_layout: single-package
quality_profile: standard
python_versions:
  - "3.11"
  - "3.12"
  - "3.13"

# Component-First Configuration
cli_module: enabled
cli_languages:
  - python

api_module: enabled
api_languages:
  - python
api_features: none

mcp_module: enabled
mcp_languages:
  - python

docs_module: enabled
docs_framework: fumadocs

shared_logic: disabled
codegen_module: disabled
changelog_module: disabled
ci_platform: github-actions
ai_tools_module: enabled

# Fumadocs Configuration
fumadocs_search_provider: orama
fumadocs_llms_txt: enabled
fumadocs_ai_search: disabled
fumadocs_openapi: enabled
fumadocs_typedoc: disabled
fumadocs_theme: shadcn
fumadocs_sidebar: shadcn
fumadocs_i18n: disabled
fumadocs_blog: disabled
fumadocs_code_theme: catppuccin
fumadocs_twoslash: enabled
fumadocs_image_zoom: enabled
fumadocs_banner: enabled
fumadocs_last_updated: enabled
fumadocs_edit_on_github: enabled
fumadocs_feedback: enabled
fumadocs_toc_depth: "3"
fumadocs_mermaid: enabled
fumadocs_math: enabled
