# Copier Answers: Changelog Monorepo
# Description: Monorepo with Python CLI + API and changelog
# Ideal for: Multi-package projects with release management

_commit: HEAD
_src_path: ../../template
project_name: "Changelog Monorepo"
project_slug: changelog-monorepo
package_name: changelog_monorepo
project_layout: monorepo
quality_profile: standard
python_versions:
  - "3.11"
  - "3.12"
  - "3.13"

# Component-First Configuration
cli_module: enabled
cli_languages:
  - python

api_module: enabled
api_languages:
  - python
api_features: none

mcp_module: disabled

docs_module: enabled
docs_framework: fumadocs

shared_logic: enabled
codegen_module: disabled
changelog_module: enabled
ci_platform: github-actions
ai_tools_module: enabled
