# Copier Answers: Full Stack Polyglot
# Description: CLI + API + MCP + Docs monorepo
# Ideal for: Complex projects, polyglot teams

_commit: HEAD
_src_path: ../../template
project_name: riso-full-stack-example
project_slug: riso-full-stack-example
package_name: riso_full_stack_example
project_layout: monorepo
quality_profile: standard
python_versions:
  - "3.11"
  - "3.12"
  - "3.13"

# Component-First Configuration
cli_module: enabled
cli_languages:
  - python

api_module: enabled
api_languages:
  - python
api_features: websocket

mcp_module: enabled
mcp_languages:
  - python
mcp_transport: stdio
mcp_example_tools: true

docs_module: enabled
docs_framework: fumadocs

shared_logic: enabled
codegen_module: disabled
changelog_module: enabled
ci_platform: github-actions
ai_tools_module: enabled
