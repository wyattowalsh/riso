# Copier Answers: API Monorepo
# Description: Python + Node API services in a monorepo
# Ideal for: Microservices, polyglot backends

_commit: HEAD
_src_path: ../../template
project_name: Riso API Monorepo
project_slug: riso-api-monorepo
package_name: riso_api_monorepo
project_layout: monorepo
quality_profile: standard
python_versions:
  - "3.11"
  - "3.12"
  - "3.13"

# Component-First Configuration
cli_module: disabled

# Note: For multiple API languages, create separate modules
# This config uses Python as primary API
api_module: enabled
api_languages:
  - python
api_features: none

mcp_module: disabled

docs_module: enabled
docs_framework: fumadocs

shared_logic: enabled
codegen_module: disabled
changelog_module: disabled
ci_platform: github-actions
ai_tools_module: enabled
