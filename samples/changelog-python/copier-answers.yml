# Copier Answers: Changelog Python
# Description: Python CLI + API with changelog generation
# Ideal for: Python packages with release management

_commit: HEAD
_src_path: ../../template
project_name: "Changelog Python"
project_layout: single-package
quality_profile: standard
python_versions:
  - "3.11"
  - "3.12"
  - "3.13"

# Component-First Configuration
cli_module: enabled
cli_languages:
  - python

api_module: enabled
api_languages:
  - python
api_features: none

mcp_module: disabled

docs_module: enabled
docs_framework: sphinx-shibuya

shared_logic: enabled
codegen_module: disabled
changelog_module: enabled
ci_platform: github-actions
ai_tools_module: enabled
