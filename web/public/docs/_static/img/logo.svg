<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Riso">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Outer circle with gradient background -->
  <circle cx="50" cy="50" r="47" fill="url(#bgGradient)"/>
  <circle cx="50" cy="50" r="47" stroke="#1e293b" stroke-width="3" fill="none"/>

  <!-- Risograph printer body -->
  <g transform="translate(20, 25)">
    <!-- Main body -->
    <rect x="5" y="20" width="50" height="30" rx="3" fill="#475569" stroke="#1e293b" stroke-width="2"/>

    <!-- Top paper tray -->
    <path d="M8 20 L8 12 L52 12 L52 20" fill="#e2e8f0" stroke="#1e293b" stroke-width="2"/>

    <!-- Paper in tray -->
    <rect x="12" y="8" width="36" height="6" fill="#f8fafc" stroke="#1e293b" stroke-width="1"/>

    <!-- Control panel buttons -->
    <circle cx="18" cy="30" r="3" fill="#f8fafc" stroke="#1e293b" stroke-width="1"/>
    <circle cx="28" cy="30" r="3" fill="#f8fafc" stroke="#1e293b" stroke-width="1"/>
    <circle cx="38" cy="30" r="3" fill="#f8fafc" stroke="#1e293b" stroke-width="1"/>

    <!-- Output tray -->
    <rect x="8" y="38" width="44" height="10" rx="1" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>

    <!-- Paper output indicator lines -->
    <path d="M52 35 L58 32 M52 38 L58 36 M52 41 L58 40" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>

    <!-- Feet -->
    <rect x="10" y="50" width="6" height="4" rx="1" fill="#334155"/>
    <rect x="44" y="50" width="6" height="4" rx="1" fill="#334155"/>
  </g>
</svg>
